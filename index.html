            color: transparent;

        .sub-head {
            color: var(--text-secondary);

        .cta-button {

            border: none;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 1.2rem 1.5rem;

            align-items: center;
            justify-content: center;

        }

        .cta-button i {

            border: 1px solid var(--border);
            margin: 2rem 0 1rem;

        .slider-container {
            position: relative;
            width: 100%;
            user-select: none;
        }

        .slider-track {
            display: flex;
            overflow-x: hidden;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            background: #111;
        }

        .slider-track::-webkit-scrollbar {
            display: none;
        }

        .slide {
            flex: 0 0 100%;
            scroll-snap-align: start;
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .slide img, .slide video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .slide-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
            padding: 2rem 1rem 1rem;
            font-weight: 600;
            font-size: 1rem;
        }

        .slider-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: var(--surface-light);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 10px;
            background: var(--text-secondary);
            transition: 0.2s;
            cursor: pointer;
        }

        .dot.active {

            text-align: center;

            color: white;
            border-color: transparent;

            gap: 1.5rem;
            grid-template-columns: 1fr;
            margin-top: 1rem;
        }

        @media (min-width: 640px) {
            .accounts-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (min-width: 1024px) {
            .accounts-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .account-card {
            background: var(--surface);
            border-radius: 1.5rem;
            border: 1px solid var(--border);

        }

        .card-media {

            display: none;

            border-radius: 4px;
        }
        
        .progress-text {
            text-align: center;
            font-size: 0.8rem;

        }

        .modal-footer { padding:1rem 1.5rem 1.5rem; display:flex; gap:0.8rem; }
        .btn {

            border-radius: 20px;

            border-radius: 12px;

            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.8rem;
            margin: 1rem 0;
        }
        
        .book-request-item {
            background: var(--surface-light);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 0.8rem;
            border: 1px solid var(--border);
        }
        .book-request-item p {
            margin: 0.3rem 0;
            font-size: 0.9rem;
        }
        .book-request-item .label {
            color: var(--text-secondary);
            font-weight: 600;
            display: inline-block;
            width: 80px;
        }
        .request-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }
        .request-actions button {
            flex: 1;
            padding: 0.5rem;
            border-radius: 2rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-wa {
            background: #25D366;
            color: white;
        }
        .btn-cancel {
            background: #ef4444;
            color: white;
        }
        
        .user-card {
            background: var(--surface);
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            border: 1px solid var(--border);
        }
        .user-card .icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.5rem;
        }
        .user-card .count {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .user-card .label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .user-card .info {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 0.3rem;
        }
        
        .online-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        .upload-btn {
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 3rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(236,72,153,0.4);
        }
        .upload-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Mobile video fixes */
        video {
            max-width: 100%;
            height: auto;
            display: block;
            background: #000;
        }
        
        .card-media {
            background-color: #1a1a24;
            min-height: 200px;
            object-fit: cover;
        }
        
        /* Video play button styling for mobile */
        video::-webkit-media-controls-play-button {
            background-color: var(--primary);
            border-radius: 50%;
        }
        
        video::-webkit-media-controls-start-playback-button {
            display: none;
        }
    </style>
</head>

            const t = translations[lang] || translations.en;

            renderContacts();
            if (appState.isAdminLoggedIn) renderBookRequests();
            
            const usdtEl = document.getElementById('current-usdt-address');
            if (usdtEl) usdtEl.innerText = appState.usdtAddress;
        }

        function setLanguage(lang) {
            applyTranslation(lang);
            closeModal('language-modal');
        }

        // ============================================
        // POCKETBASE DATA LOADING WITH VIDEO SUPPORT
        // ============================================
        async function loadAccountsFromPB() {
            try {
                const records = await pb.collection('accounts').getFullList({
                    $autoCancel: false,
                    requestKey: null
                });
                
                if (records.length > 0) {
                    appState.accounts = records.map(record => {
                        let mediaUrl = '';
                        if (record.media) {
                            // Get the file URL from PocketBase
                            mediaUrl = pb.files.getUrl(record, record.media);
                            // Ensure HTTPS
                            mediaUrl = mediaUrl.replace('http://', 'https://');
                            
                            // Add cache busting for mobile
                            if (record.mediaType === 'video') {
                                mediaUrl = mediaUrl + '?v=' + Date.now();
                            }
                        } else {
                            mediaUrl = 'https://images.pexels.com/photos/3165335/pexels-photo-3165335.jpeg?auto=compress&w=400';
                        }
                        
                        return {
                            id: record.id,
                            title: record.title,
                            desc: record.description,
                            tier: record.tier,
                            price_usd: record.price_usd,
                            price_afn: record.price_afn,
                            media: mediaUrl,
                            mediaType: record.mediaType || 'image',
                            // Store the original record for file access
                            _record: record
                        };
                    });
                    
                    // Debug log to see what's loaded
                    console.log('📦 Accounts loaded:', appState.accounts.length);
                    appState.accounts.forEach(acc => {
                        console.log(`📹 ${acc.title}: ${acc.mediaType} - ${acc.media}`);
                    });
                    
                    renderAccounts();
                }
            } catch (error) {
                console.error('Failed to load accounts from PocketBase:', error);
            }
        }

        // ============================================
        // RENDER ACCOUNTS WITH VIDEO SUPPORT
        // ============================================
        function renderAccounts() {
            const grid = document.getElementById('accounts-grid');
            if (!grid) return;
            
            let filtered = appState.accounts;
            if (appState.currentFilter !== 'all') {
                filtered = filtered.filter(a => a.tier === appState.currentFilter);
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; padding:2rem; text-align:center;">No accounts in this tier</div>';
                return;
            }
            
            const t = translations[appState.currentLanguage] || translations.en;
            
            grid.innerHTML = filtered.map(acc => {
                // Create media element based on type
                let mediaHtml;
                
                if (acc.mediaType === 'video') {
                    // Video element with mobile optimizations
                    mediaHtml = `
                        <video 
                            class="card-media" 
                            controls
                            preload="metadata"
                            playsinline
                            webkit-playsinline
                            x5-playsinline
                            poster="${acc.media.replace(/\.[^/.]+$/, '.jpg') || ''}"
                            crossorigin="anonymous"
                            onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'card-media\\' style=\\'display:flex;align-items:center;justify-content:center;background:var(--surface-lighter);\\'><span style=\\'font-size:3rem;\\'>📹</span><p style=\\'color:var(--text-secondary);margin-top:0.5rem;\\'>Video unavailable</p></div>';"
                        >
                            <source src="${acc.media}" type="video/mp4">
                            <source src="${acc.media}" type="video/webm">
                            <source src="${acc.media}" type="video/ogg">
                            Your browser does not support the video tag.
                        </video>
                    `;
                } else {
                    // Image element with fallback
                    mediaHtml = `
                        <img 
                            src="${acc.media}" 
                            class="card-media" 
                            alt="${acc.title}"
                            crossorigin="anonymous"
                            loading="lazy"
                            onerror="this.onerror=null; this.src='https://images.pexels.com/photos/3165335/pexels-photo-3165335.jpeg?auto=compress&w=400';"
                        >
                    `;
                }
                
                return `
                    <div class="account-card" data-id="${acc.id}">
                        <div style="position:relative; width:100%; aspect-ratio:16/9; overflow:hidden; background:var(--surface-lighter);">
                            ${mediaHtml}
                        </div>
                        <div class="card-content">
                            <div class="card-title">
                                ${acc.title}
                                <span class="tier-badge ${acc.tier}">${acc.tier}</span>
                            </div>
                            <div class="card-desc">${acc.desc || 'Premium PUBG account'}</div>
                            <div class="price-row">
                                <span class="usd-price">$${acc.price_usd.toFixed(2)}</span>
                                <span class="afn-price">${acc.price_afn.toLocaleString()} AFN</span>
                            </div>
                            <div class="action-buttons">
                                <button class="action-btn" onclick="bookAccount('${acc.id}')"><i class="fa fa-bookmark"></i> ${t.bookTitle}</button>
                                <button class="action-btn buy" onclick="buyAccount('${acc.id}')"><i class="fa fa-bolt"></i> ${t.buyTitle}</button>
                                <button class="action-btn" onclick="infoAccount('${acc.id}')"><i class="fa fa-info"></i> ${t.infoTitle}</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Force video reload on mobile after rendering
            if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                setTimeout(() => {
                    document.querySelectorAll('video').forEach(video => {
                        video.load();
                    });
                }, 500);
            }
        }

        // ============================================
        // VIDEO UPLOAD FUNCTION (for admin panel)
        // ============================================
        window.uploadNewAccount = async function() {
            const tier = document.getElementById('account-tier').value;
            const title = document.getElementById('account-title').value.trim();
            const desc = document.getElementById('account-description').value.trim() || 'Premium PUBG account';
            const priceUsd = parseFloat(document.getElementById('account-price-usd').value);
            const priceAfn = parseInt(document.getElementById('account-price-afn').value);
            const fileInput = document.getElementById('account-media-file');
            
            if (!tier || !title || !priceUsd || !priceAfn) {
                alert('Please fill all required fields');
                return;
            }
            
            if (!fileInput.files || !fileInput.files[0]) {
                alert('Please select an image or video');
                return;
            }
            
            const file = fileInput.files[0];
            const isVideo = file.type.startsWith('video/');
            
            // Show progress
            const progressContainer = document.getElementById('upload-progress');
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            const uploadBtn = document.getElementById('upload-btn');
            
            progressContainer.classList.add('active');
            uploadBtn.disabled = true;
            
            try {
                // Create form data for PocketBase
                const formData = new FormData();
                formData.append('title', title);
                formData.append('description', desc);
                formData.append('tier', tier);
                formData.append('price_usd', priceUsd);
                formData.append('price_afn', priceAfn);
                formData.append('mediaType', isVideo ? 'video' : 'image');
                formData.append('media', file);
                
                // Simulate progress
                let progress = 0;
                const interval = setInterval(() => {
                    progress += Math.random() * 15;
                    if (progress >= 100) progress = 100;
                    progressBar.style.width = progress + '%';
                    progressText.innerHTML = `Uploading... ${Math.round(progress)}%`;
                }, 200);
                
                // Upload to PocketBase
                const record = await pb.collection('accounts').create(formData);
                
                clearInterval(interval);
                progressBar.style.width = '100%';
                progressText.innerHTML = 'Upload complete!';
                
                // Add to local state
                const newAccount = {
                    id: record.id,
                    title: title,
                    desc: desc,
                    tier: tier,
                    price_usd: priceUsd,
                    price_afn: priceAfn,
                    media: pb.files.getUrl(record, record.media).replace('http://', 'https://'),
                    mediaType: isVideo ? 'video' : 'image',
                    _record: record
                };
                
                appState.accounts.push(newAccount);
                
                setTimeout(() => {
                    closeModal('add-account-modal');
                    renderAccounts();
                    if (appState.isAdminLoggedIn) {
                        document.getElementById('admin-account-count').innerText = appState.accounts.length;
                    }
                    alert('Account uploaded successfully!');
                    
                    progressContainer.classList.remove('active');
                    progressBar.style.width = '0%';
                    progressText.innerHTML = '';
                    uploadBtn.disabled = false;
                }, 500);
                
            } catch (error) {
                console.error('Upload error:', error);
                alert('Failed to upload: ' + error.message);
                progressContainer.classList.remove('active');
                progressBar.style.width = '0%';
                progressText.innerHTML = '';
                uploadBtn.disabled = false;
            }
        };

        // ============================================
        // REST OF YOUR FUNCTIONS (keep them as they are)
        // ============================================
        // ... (include all your other functions here: loadContactsFromPB, 
        // loadSettingsFromPB, renderContacts, adminLogin, etc.)
        
        // ============================================
        // INITIALIZATION
        // ============================================
        const savedLang = localStorage.getItem('gk_language') || 'en';
        applyTranslation(savedLang);
        renderAdsSlider();
        renderContacts();
        renderAccounts();
        
        loadAccountsFromPB();
        loadContactsFromPB();
        loadSettingsFromPB();
        
        // Mobile-specific fixes
        if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            // Pre-load the PocketBase URL to accept certificate
            fetch(PB_URL + '/api/health', { mode: 'no-cors' }).catch(() => {});
            
            // Show help message
            setTimeout(() => {
                if (appState.accounts.length === 0) {
                    const msg = document.createElement('div');
                    msg.style.cssText = 'position:fixed; bottom:80px; left:10px; right:10px; background:var(--primary); color:white; padding:1rem; border-radius:1rem; text-align:center; z-index:1000;';
                    msg.innerHTML = '📱 Please visit <strong>' + PB_URL + '/api/health</strong> in this browser and accept the certificate to see videos.';
                    document.body.appendChild(msg);
                    setTimeout(() => msg.remove(), 10000);
                }
            }, 3000);
        }
    </script>
