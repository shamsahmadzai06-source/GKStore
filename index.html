    <script>
        // ============================================
        // UPDATED VIDEO PLAYER - FIXED FOR iOS & Android
        // ============================================
        async function setupVideoPlayer(container, videoUrl) {
            if (!container) return;
            
            // Clear container
            container.innerHTML = '';
            
            // Create video element
            const video = document.createElement('video');
            video.controls = true;
            video.playsInline = true;
            video.webkitPlaysInline = true;
            video.preload = 'metadata';
            video.style.width = '100%';
            video.style.height = '100%';
            video.style.objectFit = 'contain';
            video.style.backgroundColor = '#000';
            
            // Create loading overlay
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'video-loading-overlay';
            loadingDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
            loadingDiv.style.display = 'flex';
            
            container.appendChild(video);
            container.appendChild(loadingDiv);
            
            // Set up error handling
            let retryCount = 0;
            const maxRetries = 2;
            
            function handleError() {
                if (retryCount < maxRetries) {
                    retryCount++;
                    console.log(`Retry ${retryCount}/${maxRetries} for video`);
                    setTimeout(() => {
                        loadVideo();
                    }, 1000);
                } else {
                    loadingDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Video unavailable<br><button class="retry-video-btn" onclick="this.parentElement.parentElement.querySelector(\'video\').load()">Retry</button>';
                    loadingDiv.style.display = 'flex';
                }
            }
            
            async function loadVideo() {
                loadingDiv.style.display = 'flex';
                loadingDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
                
                try {
                    // For cross-origin videos, use fetch with blob for better compatibility
                    const response = await fetch(videoUrl, {
                        mode: 'cors',
                        cache: 'force-cache'
                    });
                    
                    if (!response.ok) throw new Error('Network response was not ok');
                    
                    const blob = await response.blob();
                    const blobUrl = URL.createObjectURL(blob);
                    
                    video.src = blobUrl;
                    
                    video.oncanplay = () => {
                        loadingDiv.style.display = 'none';
                        // Clean up blob URL after video loads
                        setTimeout(() => URL.revokeObjectURL(blobUrl), 10000);
                    };
                    
                    video.onerror = () => {
                        URL.revokeObjectURL(blobUrl);
                        handleError();
                    };
                    
                    video.onwaiting = () => {
                        loadingDiv.style.display = 'flex';
                        loadingDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Buffering...';
                    };
                    
                    video.onplaying = () => {
                        loadingDiv.style.display = 'none';
                    };
                    
                } catch (error) {
                    console.error('Video fetch error:', error);
                    handleError();
                }
            }
            
            // Start loading
            await loadVideo();
            
            // Handle autoplay
            video.muted = true;
            const playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.catch(e => {
                    console.log('Autoplay prevented:', e);
                    video.muted = true;
                    video.play().catch(() => {});
                });
            }
            
            // Loop video
            video.addEventListener('ended', () => {
                video.currentTime = 0;
                video.play().catch(e => console.log('Loop failed:', e));
            });
        }

        // ============================================
        // CONFIGURATION
        // ============================================
        const CLOUDFLARE_URL = 'https://skip-faces-entering-garmin.trycloudflare.com';
        const PB_URL = CLOUDFLARE_URL;
        const pb = new PocketBase(PB_URL);
        
        // App state
        let accounts = [];
        let currentFilter = 'all';
        let isAdminLoggedIn = false;
        let currentMediaData = null;
        
        // Load from localStorage
        if (localStorage.getItem('gk_accounts')) {
            try { accounts = JSON.parse(localStorage.getItem('gk_accounts')); } catch(e) {}
        }
        
        // ============================================
        // CORE FUNCTIONS
        // ============================================
        function playClickSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) {
                    const ctx = new AudioContext();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = 880;
                    gain.gain.value = 0.05;
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.1);
                    osc.stop(ctx.currentTime + 0.1);
                }
            } catch(e) {}
        }
        
        function renderAccounts() {
            const grid = document.getElementById('accounts-grid');
            if (!grid) return;
            
            let filtered = accounts;
            if (currentFilter !== 'all') {
                filtered = accounts.filter(a => a.tier === currentFilter);
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div style="text-align:center; padding:2rem;">No accounts available</div>';
                return;
            }
            
            grid.innerHTML = filtered.map(acc => {
                const mediaHtml = acc.mediaType === 'video' 
                    ? `<div class="card-media" id="video-${acc.id}" style="width:100%; height:100%;"></div>`
                    : `<img src="${acc.media}" class="card-media" onclick="openFullscreenImage('${acc.media}')" style="cursor:pointer;">`;
                    
                return `
                    <div class="account-card">
                        <div style="width:100%; aspect-ratio:16/9; background:#000;">
                            ${mediaHtml}
                        </div>
                        <div class="card-content">
                            <div class="card-title">
                                ${escapeHtml(acc.title)}
                                <span class="tier-badge ${acc.tier}">${acc.tier}</span>
                            </div>
                            <div class="card-desc">${escapeHtml(acc.desc || '')}</div>
                            <div class="price-row">
                                <span class="usd-price">$${acc.price_usd}</span>
                                <span class="afn-price">${acc.price_afn} AFN</span>
                            </div>
                            <div class="action-buttons">
                                <button class="action-btn" onclick="buyAccount('${acc.id}')">
                                    <i class="fa fa-bolt"></i> Buy
                                </button>
                                <button class="action-btn" onclick="infoAccount('${acc.id}')">
                                    <i class="fa fa-info"></i> Info
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Setup videos after rendering
            setTimeout(() => {
                filtered.forEach(acc => {
                    if (acc.mediaType === 'video') {
                        const container = document.getElementById(`video-${acc.id}`);
                        if (container) {
                            setupVideoPlayer(container, acc.media);
                        }
                    }
                });
            }, 100);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m] || m);
        }
        
        function filterAccounts(tier) {
            currentFilter = tier;
            document.querySelectorAll('.tier-tab').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tier-tab[data-tier="${tier}"]`).classList.add('active');
            renderAccounts();
        }
        
        function switchScreen(screen) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`${screen}-screen`).classList.add('active');
            document.querySelectorAll('.bottom-nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`nav-${screen}`).classList.add('active');
            
            if (screen === 'accounts') renderAccounts();
            if (screen === 'admin') {
                if (isAdminLoggedIn) {
                    document.getElementById('admin-login-section').classList.add('hidden');
                    document.getElementById('admin-dashboard').classList.remove('hidden');
                } else {
                    document.getElementById('admin-login-section').classList.remove('hidden');
                    document.getElementById('admin-dashboard').classList.add('hidden');
                }
            }
        }
        
        // ============================================
        // POCKETBASE DATA LOADING
        // ============================================
        async function loadAccountsFromPB() {
            try {
                const records = await pb.collection('accounts').getFullList({ sort: '-created' });
                if (records && records.length) {
                    accounts = records.map(r => ({
                        id: r.id,
                        title: r.title,
                        desc: r.description,
                        tier: r.tier,
                        price_usd: r.price_usd,
                        price_afn: r.price_afn,
                        media: r.media ? pb.files.getUrl(r, r.media) : '',
                        mediaType: r.mediaType || 'image'
                    }));
                    localStorage.setItem('gk_accounts', JSON.stringify(accounts));
                    renderAccounts();
                }
            } catch(e) {
                console.log('Using local accounts');
            }
        }
        
        // ============================================
        // ADMIN FUNCTIONS
        // ============================================
        async function adminLogin() {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-password').value;
            
            try {
                await pb.admins.authWithPassword(email, pass);
                isAdminLoggedIn = true;
                document.getElementById('admin-login-section').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                await loadAccountsFromPB();
            } catch(e) {
                alert('Invalid credentials');
            }
        }
        
        function logout() {
            pb.authStore.clear();
            isAdminLoggedIn = false;
            document.getElementById('admin-login-section').classList.remove('hidden');
            document.getElementById('admin-dashboard').classList.add('hidden');
            switchScreen('main');
        }
        
        function previewMediaFromFile() {
            const file = document.getElementById('account-media-file').files[0];
            const preview = document.getElementById('media-preview');
            const btn = document.getElementById('upload-btn');
            
            if (!file) {
                btn.disabled = true;
                preview.innerHTML = '<i class="fas fa-cloud-upload-alt"></i>';
                return;
            }
            
            const isVideo = file.type.startsWith('video/');
            const maxSize = isVideo ? 200 * 1024 * 1024 : 10 * 1024 * 1024;
            
            if (file.size > maxSize) {
                alert(`File too large. Max size: ${isVideo ? '200MB' : '10MB'}`);
                btn.disabled = true;
                return;
            }
            
            btn.disabled = false;
            const reader = new FileReader();
            reader.onload = e => {
                if (isVideo) {
                    preview.innerHTML = `<video src="${e.target.result}" controls style="max-height:200px;"></video>`;
                } else {
                    preview.innerHTML = `<img src="${e.target.result}" style="max-height:200px;">`;
                }
                currentMediaData = { type: isVideo ? 'video' : 'image', data: e.target.result };
            };
            reader.readAsDataURL(file);
        }
        
        async function uploadNewAccount() {
            const tier = document.getElementById('account-tier').value;
            const title = document.getElementById('account-title').value.trim();
            const desc = document.getElementById('account-description').value.trim() || 'Premium PUBG account';
            const priceUsd = parseFloat(document.getElementById('account-price-usd').value);
            const priceAfn = parseInt(document.getElementById('account-price-afn').value);
            const file = document.getElementById('account-media-file').files[0];
            
            if (!tier || !title || !priceUsd || !priceAfn || !file) {
                alert('Please fill all fields');
                return;
            }
            
            const isVideo = file.type.startsWith('video/');
            
            try {
                const formData = new FormData();
                formData.append('title', title);
                formData.append('description', desc);
                formData.append('tier', tier);
                formData.append('price_usd', priceUsd);
                formData.append('price_afn', priceAfn);
                formData.append('media', file);
                formData.append('mediaType', isVideo ? 'video' : 'image');
                
                const record = await pb.collection('accounts').create(formData);
                const newAccount = {
                    id: record.id,
                    title,
                    desc,
                    tier,
                    price_usd: priceUsd,
                    price_afn: priceAfn,
                    media: pb.files.getUrl(record, record.media),
                    mediaType: isVideo ? 'video' : 'image'
                };
                
                accounts.unshift(newAccount);
                localStorage.setItem('gk_accounts', JSON.stringify(accounts));
                renderAccounts();
                alert('✅ Uploaded successfully!');
                closeModal('add-account-modal');
                
                // Reset form
                document.getElementById('account-title').value = '';
                document.getElementById('account-description').value = '';
                document.getElementById('account-price-usd').value = '';
                document.getElementById('account-price-afn').value = '';
                document.getElementById('account-media-file').value = '';
                document.getElementById('media-preview').innerHTML = '<i class="fas fa-cloud-upload-alt"></i>';
                
            } catch(e) {
                alert('Upload failed: ' + e.message);
            }
        }
        
        function showAddAccountModal() {
            openModal('add-account-modal');
        }
        
        function buyAccount(id) {
            const acc = accounts.find(a => a.id === id);
            if (!acc) return;
            alert(`Buying: ${acc.title}\nPrice: $${acc.price_usd}\nContact: WhatsApp +93793066322`);
            window.open('https://wa.me/93793066322?text=I want to buy: ' + acc.title, '_blank');
        }
        
        function infoAccount(id) {
            const acc = accounts.find(a => a.id === id);
            if (!acc) return;
            alert(`Title: ${acc.title}\nDescription: ${acc.desc}\nPrice: $${acc.price_usd} / ${acc.price_afn} AFN`);
        }
        
        function openModal(id) {
            document.getElementById(id).classList.remove('hidden');
        }
        
        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }
        
        function openFullscreenImage(src) {
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.right = '0';
            modal.style.bottom = '0';
            modal.style.background = 'rgba(0,0,0,0.95)';
            modal.style.zIndex = '10000';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            modal.style.cursor = 'pointer';
            
            const img = document.createElement('img');
            img.src = src;
            img.style.maxWidth = '90%';
            img.style.maxHeight = '90%';
            img.style.objectFit = 'contain';
            
            modal.appendChild(img);
            modal.onclick = () => modal.remove();
            document.body.appendChild(modal);
        }
        
        // ============================================
        // ADS SLIDER
        // ============================================
        let ads = [];
        
        function renderAdsSlider() {
            const container = document.getElementById('ads-slider');
            if (!container) return;
            
            if (ads.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:1rem;">No ads available</div>';
                return;
            }
            
            let slides = '';
            ads.forEach((ad, i) => {
                if (ad.type === 'video') {
                    slides += `<div class="slide"><div id="ad-video-${i}" style="width:100%; height:100%;"></div><div class="slide-caption">${escapeHtml(ad.caption)}</div></div>`;
                } else {
                    slides += `<div class="slide"><img src="${ad.data}" alt="ad"><div class="slide-caption">${escapeHtml(ad.caption)}</div></div>`;
                }
            });
            
            let dots = '';
            ads.forEach((_, i) => {
                dots += `<span class="dot ${i === 0 ? 'active' : ''}" onclick="jumpToSlide(${i})"></span>`;
            });
            
            container.innerHTML = `
                <div class="slider-container">
                    <div class="slider-track" id="slider-track">${slides}</div>
                    <div class="slider-dots">${dots}</div>
                </div>
            `;
            
            // Setup videos in ads
            setTimeout(() => {
                ads.forEach((ad, i) => {
                    if (ad.type === 'video') {
                        const videoDiv = document.getElementById(`ad-video-${i}`);
                        if (videoDiv) {
                            const video = document.createElement('video');
                            video.src = ad.data;
                            video.controls = true;
                            video.playsInline = true;
                            video.style.width = '100%';
                            video.style.height = '100%';
                            video.style.objectFit = 'cover';
                            videoDiv.appendChild(video);
                        }
                    }
                });
            }, 100);
            
            // Auto slide
            let autoSlide = setInterval(() => {
                const track = document.getElementById('slider-track');
                if (!track || ads.length === 0) return;
                const slideWidth = track.clientWidth;
                const currentIndex = Math.round(track.scrollLeft / slideWidth);
                const nextIndex = (currentIndex + 1) % ads.length;
                track.scrollTo({ left: nextIndex * slideWidth, behavior: 'smooth' });
                document.querySelectorAll('.dot').forEach((d, i) => {
                    d.classList.toggle('active', i === nextIndex);
                });
            }, 3000);
        }
        
        function jumpToSlide(idx) {
            const track = document.getElementById('slider-track');
            if (track) {
                track.scrollTo({ left: idx * track.clientWidth, behavior: 'smooth' });
            }
        }
        
        // ============================================
        // INITIALIZATION
        // ============================================
        // Load sample ads
        ads = [
            { type: 'image', data: 'https://via.placeholder.com/800x450/ec4899/white?text=GK+Store', caption: 'Welcome to GK Store!' },
            { type: 'image', data: 'https://via.placeholder.com/800x450/8b5cf6/white?text=Best+PUBG+Accounts', caption: 'Best PUBG Accounts' }
        ];
        
        renderAdsSlider();
        loadAccountsFromPB();
        
        // PWA Installation
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const installBtn = document.createElement('button');
            installBtn.className = 'install-btn-fixed';
            installBtn.innerHTML = '<i class="fas fa-download"></i> Install App';
            installBtn.onclick = () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then(() => {
                        deferredPrompt = null;
                        installBtn.remove();
                    });
                }
            };
            document.body.appendChild(installBtn);
        });
        
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
        }
        
        // Set active nav
        document.getElementById('nav-main').classList.add('active');
        
        // Make functions global
        window.playClickSound = playClickSound;
        window.switchScreen = switchScreen;
        window.filterAccounts = filterAccounts;
        window.buyAccount = buyAccount;
        window.infoAccount = infoAccount;
        window.adminLogin = adminLogin;
        window.logout = logout;
        window.showAddAccountModal = showAddAccountModal;
        window.uploadNewAccount = uploadNewAccount;
        window.previewMediaFromFile = previewMediaFromFile;
        window.closeModal = closeModal;
        window.openFullscreenImage = openFullscreenImage;
        window.jumpToSlide = jumpToSlide;
    </script>
</body>
</html>
