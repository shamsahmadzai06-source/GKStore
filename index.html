<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GK Store · PUBG Accounts</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ========== COMPLETE CSS STYLING ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ec4899;
            --primary-dark: #db2777;
            --secondary: #8b5cf6;
            --background: #0a0a0f;
            --surface: #16161f;
            --surface-light: #1f1f2b;
            --text: #ffffff;
            --text-secondary: #a0a0b0;
            --border: #2a2a36;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--background);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        .top-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-actions {
            display: flex;
            gap: 8px;
        }

        .nav-btn {
            background: var(--surface-light);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .nav-btn:hover {
            background: var(--primary);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Screens */
        .screen { display: none; }
        .screen.active { display: block; }

        /* Main Screen */
        .big-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 1rem 0;
        }

        .cta-button {
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            border: none;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 1.2rem;
            border-radius: 60px;
            width: 100%;
            max-width: 500px;
            margin: 2rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .online-badge {
            background: #10b981;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .online-indicator {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Accounts Grid */
        .tier-header {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .tier-tab {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }

        .tier-tab.active {
            background: var(--primary);
            color: white;
        }

        .accounts-grid {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }

        .account-card {
            background: var(--surface);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .card-content {
            padding: 20px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tier-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .tier-badge.small { background: #10b981; color: white; }
        .tier-badge.medium { background: #f59e0b; color: white; }
        .tier-badge.big { background: #ef4444; color: white; }

        .price-row {
            display: flex;
            justify-content: space-between;
            background: var(--surface-light);
            padding: 10px 15px;
            border-radius: 30px;
            margin: 15px 0;
            font-weight: 600;
        }

        .usd-price { color: var(--primary); }
        .afn-price { color: var(--secondary); }

        /* Contact Cards */
        .contact-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        .whatsapp-link {
            color: #25D366;
            text-decoration: none;
            font-weight: 600;
        }

        /* Admin Panel */
        .input {
            width: 100%;
            max-width: 400px;
            padding: 12px;
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .action-btn {
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text);
        }

        .action-btn.buy {
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            color: white;
            border: none;
        }

        .hidden { display: none !important; }

        .error-message {
            color: #ef4444;
            margin-top: 10px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal {
            background: var(--surface);
            border-radius: 30px;
            max-width: 500px;
            width: 90%;
            padding: 30px;
            border: 1px solid var(--border);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--surface-light);
            color: white;
            cursor: pointer;
            margin: 5px;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <div class="top-nav">
        <div class="logo" onclick="app.showMain()">
            <div class="logo-icon">GK</div>
            <span>GK Store</span>
        </div>
        <div class="nav-actions">
            <button class="nav-btn" onclick="app.openLanguageModal()"><i class="fa fa-globe"></i> Lang</button>
            <button class="nav-btn" onclick="app.showContact()"><i class="fab fa-whatsapp"></i> Contact</button>
            <button class="nav-btn" onclick="app.showAdmin()"><i class="fa fa-user-shield"></i> Admin</button>
        </div>
    </div>

    <div class="container">
        <!-- Main Screen -->
        <div id="main-screen" class="screen active">
            <h1 class="big-title">PUBG Marketplace</h1>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">Secure · Instant delivery</p>
            <button class="cta-button" onclick="app.showAccounts()">
                <i class="fa fa-gamepad"></i> View PUBG Accounts
            </button>
            
            <!-- Ads Slider -->
            <div id="ads-slider" style="margin: 2rem 0;"></div>
            
            <!-- Online Counter -->
            <div class="online-badge">
                <span class="online-indicator"></span>
                <span id="online-count">0</span> users online
            </div>
        </div>

        <!-- Accounts Screen -->
        <div id="accounts-screen" class="screen">
            <h2 style="margin-bottom: 1rem;">PUBG Accounts</h2>
            <div class="tier-header">
                <button class="tier-tab active" data-tier="all" onclick="app.filterAccounts('all')">All</button>
                <button class="tier-tab" data-tier="small" onclick="app.filterAccounts('small')">Small</button>
                <button class="tier-tab" data-tier="medium" onclick="app.filterAccounts('medium')">Medium</button>
                <button class="tier-tab" data-tier="big" onclick="app.filterAccounts('big')">Big</button>
            </div>
            <div id="accounts-grid" class="accounts-grid"></div>
            <button class="nav-btn" style="margin-top: 2rem;" onclick="app.showMain()">← Back</button>
        </div>

        <!-- Contact Screen -->
        <div id="contact-screen" class="screen">
            <h2 style="margin-bottom: 1rem;">Contact & Support</h2>
            <div id="contacts-container"></div>
            <button class="nav-btn" style="margin-top: 2rem;" onclick="app.showMain()">← Back</button>
        </div>

        <!-- Admin Screen -->
        <div id="admin-screen" class="screen">
            <h2 style="margin-bottom: 1rem;">Admin Panel</h2>
            
            <!-- Login Section -->
            <div id="login-section">
                <input type="email" id="admin-email" class="input" placeholder="Email">
                <input type="password" id="admin-password" class="input" placeholder="Password">
                <button class="action-btn buy" onclick="app.adminLogin()">Login</button>
                <div id="admin-error" class="error-message"></div>
            </div>
            
            <!-- Admin Dashboard -->
            <div id="admin-dashboard" class="hidden">
                <h3 style="margin-bottom: 1rem;">Welcome Admin!</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
                    <div class="account-card" style="padding: 1rem; text-align: center;">
                        <span id="admin-account-count">0</span> accounts
                    </div>
                    <div class="account-card" style="padding: 1rem; text-align: center;">
                        <span id="admin-bookings-count">0</span> bookings
                    </div>
                </div>
                <button class="action-btn" onclick="app.logout()">Logout</button>
            </div>
            <button class="nav-btn" style="margin-top: 2rem;" onclick="app.showMain()">← Back</button>
        </div>
    </div>

    <!-- Language Modal -->
    <div id="language-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3>Select Language</h3>
                <button class="modal-close" onclick="app.closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <button class="btn" onclick="app.setLanguage('en')">🇺🇸 English</button>
                <button class="btn" onclick="app.setLanguage('ps')">🇦🇫 پښتو</button>
                <button class="btn" onclick="app.setLanguage('fa')">🇮🇷 فارسی</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // SINGLE APP OBJECT - NO DUPLICATE DECLARATIONS
        // ============================================
        const app = {
            // Supabase
            supabase: null,
            
            // State
            accounts: [],
            contacts: [],
            ads: [],
            currentFilter: 'all',
            isAdmin: false,
            sessionId: 'session_' + Math.random().toString(36).substring(2),
            
            // Initialize
            init: async function() {
                // Initialize Supabase
                this.supabase = window.supabase.createClient(
                    'http://216.126.225.4:8000',
                    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJhbm9uIiwKICAgICJpc3MiOiAic3VwYWJhc2UtZGVtbyIsCiAgICAiaWF0IjogMTY0MTc2OTIwMCwKICAgICJleHAiOiAxNzk5NTM1NjAwCn0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE'
                );
                
                // Load data
                await this.loadAccounts();
                await this.loadContacts();
                await this.loadAds();
                
                // Check session
                const { data: { session } } = await this.supabase.auth.getSession();
                if (session) {
                    this.isAdmin = true;
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('admin-dashboard').classList.remove('hidden');
                    this.loadAdminData();
                }
                
                // Start online counter
                this.updateOnlineCount();
                setInterval(() => this.updateOnlineCount(), 30000);
            },
            
            // ===== SCREEN FUNCTIONS =====
            showMain: function() {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('main-screen').classList.add('active');
            },
            
            showAccounts: function() {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('accounts-screen').classList.add('active');
                this.displayAccounts();
            },
            
            showContact: function() {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('contact-screen').classList.add('active');
                this.displayContacts();
            },
            
            showAdmin: function() {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('admin-screen').classList.add('active');
            },
            
            // ===== MODAL FUNCTIONS =====
            openLanguageModal: function() {
                document.getElementById('language-modal').classList.remove('hidden');
            },
            
            closeModal: function() {
                document.getElementById('language-modal').classList.add('hidden');
            },
            
            setLanguage: function(lang) {
                document.documentElement.lang = lang;
                document.body.dir = (lang === 'ps' || lang === 'fa') ? 'rtl' : 'ltr';
                localStorage.setItem('gk_language', lang);
                this.closeModal();
            },
            
            // ===== ACCOUNT FUNCTIONS =====
            loadAccounts: async function() {
                try {
                    const { data, error } = await this.supabase
                        .from('accounts')
                        .select('*')
                        .eq('sold', false);
                    
                    if (error) throw error;
                    this.accounts = data || [];
                    this.displayAccounts();
                } catch (e) {
                    console.error('Error loading accounts:', e);
                }
            },
            
            filterAccounts: function(tier) {
                this.currentFilter = tier;
                document.querySelectorAll('.tier-tab').forEach(btn => btn.classList.remove('active'));
                document.querySelector(`.tier-tab[data-tier="${tier}"]`).classList.add('active');
                this.displayAccounts();
            },
            
            displayAccounts: function() {
                const grid = document.getElementById('accounts-grid');
                if (!grid) return;
                
                let filtered = this.accounts;
                if (this.currentFilter !== 'all') {
                    filtered = filtered.filter(a => a.tier === this.currentFilter);
                }
                
                if (filtered.length === 0) {
                    grid.innerHTML = '<p style="color: var(--text-secondary); text-align: center;">No accounts found</p>';
                    return;
                }
                
                grid.innerHTML = filtered.map(acc => `
                    <div class="account-card">
                        <div class="card-content">
                            <div class="card-title">
                                ${acc.title || 'PUBG Account'}
                                ${acc.tier ? `<span class="tier-badge ${acc.tier}">${acc.tier}</span>` : ''}
                            </div>
                            <p style="color: var(--text-secondary); margin-bottom: 1rem;">${acc.description || 'Premium PUBG account'}</p>
                            <div class="price-row">
                                <span class="usd-price">$${acc.price_usd || 0}</span>
                                <span class="afn-price">${acc.price_afn || 0} AFN</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            },
            
            // ===== CONTACT FUNCTIONS =====
            loadContacts: async function() {
                try {
                    const { data, error } = await this.supabase
                        .from('contacts')
                        .select('*');
                    
                    if (error) throw error;
                    this.contacts = data || [];
                    this.displayContacts();
                } catch (e) {
                    console.error('Error loading contacts:', e);
                }
            },
            
            displayContacts: function() {
                const container = document.getElementById('contacts-container');
                if (!container) return;
                
                if (this.contacts.length === 0) {
                    container.innerHTML = '<p style="color: var(--text-secondary);">No contacts available</p>';
                    return;
                }
                
                container.innerHTML = this.contacts.map(contact => `
                    <div class="contact-card">
                        <h3><i class="fab fa-whatsapp" style="color: #25D366;"></i> ${contact.name}</h3>
                        <p style="margin: 10px 0;">${contact.description || 'WhatsApp support'}</p>
                        <a href="https://wa.me/${contact.phone}" target="_blank" class="whatsapp-link">
                            <i class="fab fa-whatsapp"></i> +${contact.phone}
                        </a>
                    </div>
                `).join('');
            },
            
            // ===== ADS FUNCTIONS =====
            loadAds: async function() {
                try {
                    const { data, error } = await this.supabase
                        .from('ads')
                        .select('*')
                        .eq('is_active', true);
                    
                    if (error) throw error;
                    this.ads = data || [];
                    this.displayAds();
                } catch (e) {
                    console.error('Error loading ads:', e);
                }
            },
            
            displayAds: function() {
                const container = document.getElementById('ads-slider');
                if (!container) return;
                
                if (this.ads.length === 0) {
                    container.innerHTML = '<p style="color: var(--text-secondary);">No ads available</p>';
                    return;
                }
                
                let slides = '';
                this.ads.forEach(ad => {
                    if (ad.type === 'video') {
                        slides += `<div style="margin-bottom: 10px;"><video src="${ad.media_url}" controls style="width: 100%; border-radius: 20px;"></video></div>`;
                    } else {
                        slides += `<div style="margin-bottom: 10px;"><img src="${ad.media_url}" style="width: 100%; border-radius: 20px;"></div>`;
                    }
                });
                
                container.innerHTML = slides;
            },
            
            // ===== ADMIN FUNCTIONS =====
            adminLogin: async function() {
                const email = document.getElementById('admin-email').value;
                const password = document.getElementById('admin-password').value;
                
                if (!email || !password) {
                    document.getElementById('admin-error').innerText = 'Please enter email and password';
                    return;
                }
                
                try {
                    const { error } = await this.supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });
                    
                    if (error) throw error;
                    
                    this.isAdmin = true;
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('admin-dashboard').classList.remove('hidden');
                    document.getElementById('admin-error').innerText = '';
                    this.loadAdminData();
                    
                } catch (err) {
                    document.getElementById('admin-error').innerText = 'Login failed: ' + err.message;
                }
            },
            
            logout: function() {
                this.supabase.auth.signOut();
                this.isAdmin = false;
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('admin-dashboard').classList.add('hidden');
                this.showMain();
            },
            
            loadAdminData: async function() {
                try {
                    const { count: accountCount } = await this.supabase
                        .from('accounts')
                        .select('*', { count: 'exact', head: true });
                    
                    const { count: bookingCount } = await this.supabase
                        .from('book_requests')
                        .select('*', { count: 'exact', head: true });
                    
                    document.getElementById('admin-account-count').innerText = accountCount || 0;
                    document.getElementById('admin-bookings-count').innerText = bookingCount || 0;
                } catch (e) {
                    console.error('Error loading admin data:', e);
                }
            },
            
            // ===== ONLINE COUNTER =====
            updateOnlineCount: async function() {
                try {
                    const response = await fetch('https://api.ipify.org?format=json');
                    const data = await response.json();
                    const ip = data.ip;
                    
                    await this.supabase
                        .from('online_users')
                        .upsert({
                            session_id: this.sessionId,
                            user_ip: ip,
                            last_activity: new Date().toISOString(),
                            is_admin: this.isAdmin
                        }, { onConflict: 'session_id' });
                    
                    const fiveMinAgo = new Date(Date.now() - 5 * 60000).toISOString();
                    const { count } = await this.supabase
                        .from('online_users')
                        .select('*', { count: 'exact', head: true })
                        .gt('last_activity', fiveMinAgo);
                    
                    document.getElementById('online-count').innerText = count || 0;
                    
                } catch (e) {
                    console.log('Online counter error:', e);
                }
            }
        };

        // ===== START THE APP =====
        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
