<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#e74c3c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GK Store">
    <title>GK Store · PUBG & Electronics</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23e74c3c'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='white'%3EGK%3C/text%3E%3C/svg%3E">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#e74c3c;--primary-dark:#c0392b;--secondary:#f39c12;--surface:#1a1a1a;--surface-light:#252525;--text:#fff;--text-secondary:#a0a0a0;--border:#333;--gradient-primary:linear-gradient(135deg,#e74c3c,#f39c12)}
        
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--text);line-height:1.5;min-height:100vh;padding-bottom:80px;position:relative;overflow-x:hidden}
        
        /* WORKING BACKGROUND - Using free stock image */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a0a 50%, #0d0d1a 100%);
        }
        
        .custom-bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            pointer-events: none;
            z-index: 1;
        }
        
        .bg-overlay-fallback {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
            pointer-events: none;
        }
        
        .pubg-x-text {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 18px;
            color: rgba(231,76,60,0.6);
            letter-spacing: 3px;
            pointer-events: none;
            z-index: 5;
            animation: textPulse 3s ease-in-out infinite;
        }
        
        @keyframes textPulse {
            0%, 100% { opacity: 0.3; text-shadow: 0 0 0px rgba(231,76,60,0); }
            50% { opacity: 0.7; text-shadow: 0 0 10px rgba(231,76,60,0.5); }
        }
        
        .muzzle-flash {
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ff6600, #ff3300, transparent);
            border-radius: 50%;
            pointer-events: none;
            animation: muzzleBlast 0.2s ease-out forwards;
            z-index: 4;
        }
        
        @keyframes muzzleBlast {
            0% { opacity: 1; transform: scale(0.5); }
            100% { opacity: 0; transform: scale(2); }
        }
        
        .helicopter {
            position: absolute;
            font-size: 45px;
            pointer-events: none;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
            animation: helicopterFly 15s linear infinite;
            z-index: 3;
        }
        
        @keyframes helicopterFly {
            0% { left: -80px; top: 20%; transform: scaleX(1); }
            49% { transform: scaleX(1); }
            50% { left: 120%; top: 30%; transform: scaleX(-1); }
            100% { left: -80px; top: 40%; transform: scaleX(-1); }
        }
        
        .floating-particle {
            position: absolute;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle linear infinite;
            z-index: 3;
        }
        
        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.2; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }
        
        .top-nav,.bottom-nav,.container,.install-banner,.modal-overlay{position:relative;z-index:100}
        .account-card,.top-nav,.bottom-nav,.modal{background:rgba(26,26,26,0.85);backdrop-filter:blur(10px);border:1px solid rgba(231,76,60,0.3)}
        .top-nav,.bottom-nav{background:rgba(26,26,26,0.9);backdrop-filter:blur(12px)}
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;padding:8px 16px;z-index:1000}
        .bottom-nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--text-secondary);font-size:12px;padding:8px 16px;border-radius:40px;cursor:pointer}
        .bottom-nav-btn i{font-size:20px}
        .bottom-nav-btn.active{color:var(--primary);background:rgba(231,76,60,0.15)}
        .container{max-width:1200px;margin:0 auto;padding:16px;padding-bottom:80px;position:relative;z-index:100}
        .screen{display:none}.screen.active{display:block}
        .big-title{font-size:2.5rem;font-weight:800;background:var(--gradient-primary);-webkit-background-clip:text;background-clip:text;color:transparent}
        .cta-button{background:var(--gradient-primary);border:none;color:#fff;font-size:1.5rem;font-weight:800;padding:1.2rem 1.5rem;border-radius:60px;width:100%;max-width:500px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:14px;cursor:pointer}
        .accounts-grid,.tools-grid{display:grid;gap:1rem;grid-template-columns:1fr}
        @media (min-width:640px){.accounts-grid,.tools-grid{grid-template-columns:repeat(2,1fr)}}
        .account-card,.tool-card{border-radius:1rem;border:1px solid rgba(231,76,60,0.2);overflow:hidden}
        .card-media{width:100%;aspect-ratio:16/9;object-fit:contain;background:#000;cursor:pointer}
        .price-row{display:flex;justify-content:space-between;background:var(--surface-light);padding:0.5rem 1rem;border-radius:2rem;margin:0.5rem 0}
        .action-buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.3rem}
        .action-btn{background:var(--surface-light);border:1px solid var(--border);border-radius:2rem;padding:0.5rem 0;font-size:0.75rem;cursor:pointer;color:var(--text)}
        .action-btn.buy{background:var(--gradient-primary);border:none;color:#fff}
        .input{width:100%;padding:0.8rem;background:var(--surface-light);border:1px solid var(--border);border-radius:12px;color:#fff;margin-bottom:0.8rem}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(5px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:1rem}
        .modal{border-radius:1.5rem;max-width:500px;width:100%;padding:1rem}
        .hidden{display:none !important}
        .tier-tab,.category-tab{background:var(--surface-light);border:1px solid var(--border);color:var(--text-secondary);padding:0.5rem 1rem;border-radius:40px;cursor:pointer;margin-right:0.5rem}
        .tier-tab.active,.category-tab.active{background:var(--gradient-primary);color:#fff}
        .install-banner{background:var(--gradient-primary);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1000}
        .online-status-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(26,26,26,0.9);padding:8px 16px;border-radius:40px}
        .status-dot-badge{width:12px;height:12px;border-radius:50%;background:#2ecc71}
    </style>
</head>
<body>
    <div class="animated-bg" id="animatedBg">
        <!-- WORKING BACKGROUND IMAGE - Free stock photo that always works -->
        <img class="custom-bg-image" id="customBgImage" src="https://images.pexels.com/photos/3165335/pexels-photo-3165335.jpeg?auto=compress&w=1920&h=1080" alt="GK Store Background">
        <div class="bg-overlay-fallback"></div>
        <div class="pubg-x-text">⚡ GK STORE | PUBG X-SUITE ⚡</div>
    </div>
    
    <div id="install-banner" class="install-banner" style="display:flex">
        <div class="banner-content">
            <div class="banner-icon"><i class="fas fa-download"></i></div>
            <div class="banner-text"><strong>Install GK Store</strong><small>Tap to install</small></div>
        </div>
        <div class="banner-actions">
            <button class="banner-btn" id="bannerInstallBtn">Install Now</button>
            <button class="banner-close" id="bannerCloseBtn">✕</button>
        </div>
    </div>
    <div class="notification-center" id="notification-center"></div>
    <div class="top-nav">
        <div class="logo" onclick="switchScreen('main')">
            <div class="logo-icon">GK</div>
            <span>GK Store</span>
        </div>
        <div class="nav-actions">
            <button class="nav-btn" onclick="openLanguageModal()"><i class="fa fa-globe"></i> Lang</button>
        </div>
    </div>
    <button class="install-btn-fixed" id="install-button" style="display:flex; position:fixed; bottom:80px; right:10px; background:var(--primary); color:white; border:none; padding:10px; border-radius:50px; z-index:1000" onclick="installApp()"><i class="fas fa-download"></i> Install</button>
    <div class="container">
        <div id="main-screen" class="screen active">
            <div class="main-layout">
                <div class="title-section">
                    <h1 class="big-title">GK Marketplace</h1>
                    <div class="online-status-badge">
                        <div class="status-dot-badge"></div>
                        <span>Online</span>
                        <span id="online-count-badge">0</span>
                    </div>
                </div>
                <div class="sub-head">Secure · Instant delivery</div>
                <button class="cta-button" onclick="switchScreen('accounts')"><i class="fa fa-gamepad"></i> 🔥 PUBG Accounts <i class="fas fa-arrow-right"></i></button>
                <button class="cta-button" style="margin-top:1rem" onclick="switchScreen('tools')"><i class="fa fa-store"></i> ⚡ Shop Electronics <i class="fas fa-bolt"></i></button>
                <div class="swipe-ads" id="ads-slider"></div>
            </div>
        </div>
        <div id="accounts-screen" class="screen"><h2>🔥 PUBG Accounts</h2><div class="tier-header" id="tierHeader"></div><div id="accounts-grid" class="accounts-grid"></div></div>
        <div id="tools-screen" class="screen"><h2>🛒 Electronics Shop</h2><div class="category-header" id="categoryHeader"></div><div id="tools-grid" class="tools-grid"></div></div>
        <div id="contact-screen" class="screen"><h2>Contact & Support</h2><div id="contacts-container"></div></div>
        <div id="admin-screen" class="screen"><h2>Admin Panel</h2><div id="admin-login-section"><input type="password" id="admin-password" placeholder="Password" class="input"><button onclick="adminLogin()">Login</button><p>Password: admin123</p></div><div id="admin-dashboard" class="hidden"><button onclick="showAddAccountModal()">Add Account</button><button onclick="showAddToolModal()">Add Product</button><button onclick="logout()">Logout</button></div></div>
    </div>
    <div class="bottom-nav">
        <button class="bottom-nav-btn" id="nav-main" onclick="switchScreen('main')"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="bottom-nav-btn" id="nav-accounts" onclick="switchScreen('accounts')"><i class="fas fa-gamepad"></i><span>PUBG</span></button>
        <button class="bottom-nav-btn" id="nav-tools" onclick="switchScreen('tools')"><i class="fas fa-store"></i><span>Shop</span></button>
        <button class="bottom-nav-btn" id="nav-contact" onclick="switchScreen('contact')"><i class="fab fa-whatsapp"></i><span>Contact</span></button>
        <button class="bottom-nav-btn" id="nav-admin" onclick="switchScreen('admin')"><i class="fas fa-user-shield"></i><span>Admin</span></button>
    </div>

    <div id="add-account-modal" class="modal-overlay hidden"><div class="modal"><h3>Add Account</h3><select id="account-tier" class="input"><option value="small">Small</option><option value="medium">Medium</option><option value="big">Big</option></select><input id="account-title" placeholder="Title" class="input"><input id="account-price-usd" placeholder="USD" class="input"><input type="file" id="account-media-file" class="input"><button onclick="uploadNewAccount()">Upload</button></div></div>
    <div id="add-tool-modal" class="modal-overlay hidden"><div class="modal"><h3>Add Product</h3><select id="tool-category" class="input"><option value="phone">Phone</option><option value="computer">Computer</option></select><input id="tool-name" placeholder="Name" class="input"><input id="tool-price-usd" placeholder="USD" class="input"><input type="file" id="tool-media-file" class="input"><button onclick="uploadNewTool()">Add</button></div></div>
    <div id="language-modal" class="modal-overlay hidden"><div class="modal"><button onclick="setLanguage('en')">English</button><button onclick="setLanguage('ps')">پښتو</button></div></div>

    <script>
        // Battlefield Effects
        function createMuzzleFlash(){const bg=document.getElementById('animatedBg');if(!bg)return;const f=document.createElement('div');f.classList.add('muzzle-flash');f.style.left=Math.random()*100+'%';f.style.top=Math.random()*100+'%';bg.appendChild(f);setTimeout(()=>f.remove(),200);}
        function createHelicopter(){const bg=document.getElementById('animatedBg');if(!bg)return;const h=document.createElement('div');h.classList.add('helicopter');h.innerHTML='🚁';h.style.top=Math.random()*30+'%';bg.appendChild(h);setTimeout(()=>h.remove(),15000);}
        function createParticles(){for(let i=0;i<20;i++){const p=document.createElement('div');p.classList.add('floating-particle');p.style.width=(Math.random()*3+1)+'px';p.style.height=p.style.width;p.style.left=Math.random()*100+'%';p.style.animationDuration=(Math.random()*12+8)+'s';document.getElementById('animatedBg').appendChild(p);}}
        setInterval(createMuzzleFlash,1500);
        setInterval(()=>{if(Math.random()>0.7)createHelicopter();},20000);
        setTimeout(createParticles,100);
        
        let appState={accounts:[],tools:[],contacts:[],currentFilter:'all',currentCategory:'all',isAdminLoggedIn:false,usdtAddress:'TYpeauzqbVusejMAhJPnXuSb7wY6p69ZoY'};
        
        // Sample data
        appState.accounts=[{id:'a1',tier:'small',title:'Starter Account',desc:'Basic account',price_usd:25,price_afn:1750,media:'https://images.pexels.com/photos/3165335/pexels-photo-3165335.jpeg?auto=compress&w=400',mediaType:'image'},{id:'a2',tier:'medium',title:'Pro Account',desc:'Rare skins',price_usd:50,price_afn:3500,media:'https://images.pexels.com/photos/3165335/pexels-photo-3165335.jpeg?auto=compress&w=400',mediaType:'image'}];
        appState.tools=[{id:'t1',category:'phone',name:'iPhone 15 Pro',desc:'Latest phone',price_usd:999,price_afn:70000,media:'https://images.pexels.com/photos/699122/pexels-photo-699122.jpeg?auto=compress&w=400',mediaType:'image'}];
        appState.contacts=[{id:'c1',name:'Support',phone:'93793066322'}];
        
        function showNotification(t,m){let c=document.getElementById('notification-center');if(!c)return;let n=document.createElement('div');n.style.background='#1a1a1a';n.style.padding='10px';n.style.margin='5px';n.style.borderRadius='10px';n.style.borderLeft=`4px solid #e74c3c`;n.innerHTML=`<strong>${t}</strong><br>${m}`;c.appendChild(n);setTimeout(()=>n.remove(),3000);}
        function openModal(id){document.getElementById(id).classList.remove('hidden');}
        function closeModal(id){document.getElementById(id).classList.add('hidden');}
        
        function renderAll(){renderAccounts();renderTools();renderContacts();renderTierTabs();renderCategoryTabs();}
        function renderTierTabs(){document.getElementById('tierHeader').innerHTML=`<button class="tier-tab active" onclick="filterAccounts('all')">All</button><button class="tier-tab" onclick="filterAccounts('small')">Small</button><button class="tier-tab" onclick="filterAccounts('medium')">Medium</button><button class="tier-tab" onclick="filterAccounts('big')">Big</button>`;}
        function renderCategoryTabs(){document.getElementById('categoryHeader').innerHTML=`<button class="category-tab active" onclick="filterTools('all')">All</button><button class="category-tab" onclick="filterTools('phone')">Phones</button><button class="category-tab" onclick="filterTools('computer')">Computer</button>`;}
        function renderAccounts(){let g=document.getElementById('accounts-grid');let f=appState.accounts.filter(a=>appState.currentFilter==='all'||a.tier===appState.currentFilter);g.innerHTML=f.map(acc=>`<div class="account-card"><img src="${acc.media}" class="card-media" onclick="openFullscreenImage('${acc.media}')"><div class="card-content"><strong>${acc.title}</strong><div>${acc.desc}</div><div class="price-row"><span>$${acc.price_usd}</span><span>${acc.price_afn} AFN</span></div><div class="action-buttons"><button class="action-btn buy" onclick="buyItem('${acc.title}',${acc.price_usd})">Buy</button></div></div></div>`).join('');}
        function renderTools(){let g=document.getElementById('tools-grid');let f=appState.tools.filter(t=>appState.currentCategory==='all'||t.category===appState.currentCategory);g.innerHTML=f.map(tool=>`<div class="tool-card"><img src="${tool.media}" class="card-media" onclick="openFullscreenImage('${tool.media}')"><div class="card-content"><strong>${tool.name}</strong><div>${tool.desc}</div><div class="price-row"><span>$${tool.price_usd}</span><span>${tool.price_afn} AFN</span></div><div class="action-buttons"><button class="action-btn buy" onclick="buyItem('${tool.name}',${tool.price_usd})">Buy</button></div></div></div>`).join('');}
        function renderContacts(){document.getElementById('contacts-container').innerHTML=appState.contacts.map(c=>`<div class="account-card" style="padding:1rem"><h3>${c.name}</h3><p>+${c.phone}</p><button class="action-btn buy" onclick="window.open('https://wa.me/${c.phone}','_blank')">Chat</button></div>`).join('');}
        
        window.filterAccounts=function(tier){appState.currentFilter=tier;document.querySelectorAll('.tier-tab').forEach(btn=>btn.classList.remove('active'));event.target.classList.add('active');renderAccounts();};
        window.filterTools=function(cat){appState.currentCategory=cat;document.querySelectorAll('.category-tab').forEach(btn=>btn.classList.remove('active'));event.target.classList.add('active');renderTools();};
        window.buyItem=function(name,price){alert(`Buy ${name} for $${price}\nUSDT Address: ${appState.usdtAddress}`);};
        window.openFullscreenImage=function(src){window.open(src,'_blank');};
        window.switchScreen=function(screen){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(screen+'-screen').classList.add('active');if(screen==='accounts')renderAccounts();if(screen==='tools')renderTools();if(screen==='contact')renderContacts();};
        window.adminLogin=function(){let p=document.getElementById('admin-password').value;if(p==='admin123'){appState.isAdminLoggedIn=true;document.getElementById('admin-login-section').classList.add('hidden');document.getElementById('admin-dashboard').classList.remove('hidden');}else alert('Wrong password');};
        window.logout=function(){appState.isAdminLoggedIn=false;document.getElementById('admin-login-section').classList.remove('hidden');document.getElementById('admin-dashboard').classList.add('hidden');switchScreen('main');};
        window.uploadNewAccount=function(){let tier=document.getElementById('account-tier').value,title=document.getElementById('account-title').value,usd=parseFloat(document.getElementById('account-price-usd').value),file=document.getElementById('account-media-file').files[0];if(!tier||!title||!usd||!file){alert('Fill all');return;}let r=new FileReader();r.onload=e=>{appState.accounts.push({id:Date.now().toString(),tier,title,desc:'New account',price_usd:usd,price_afn:usd*70,media:e.target.result,mediaType:'image'});closeModal('add-account-modal');renderAll();showNotification('Success','Account added');};r.readAsDataURL(file);};
        window.uploadNewTool=function(){let cat=document.getElementById('tool-category').value,name=document.getElementById('tool-name').value,usd=parseFloat(document.getElementById('tool-price-usd').value),file=document.getElementById('tool-media-file').files[0];if(!cat||!name||!usd||!file){alert('Fill fields');return;}let r=new FileReader();r.onload=e=>{appState.tools.push({id:Date.now().toString(),category:cat,name,desc:'New product',price_usd:usd,price_afn:usd*70,media:e.target.result,mediaType:'image'});closeModal('add-tool-modal');renderAll();};r.readAsDataURL(file);};
        window.showAddAccountModal=function(){openModal('add-account-modal');};
        window.showAddToolModal=function(){openModal('add-tool-modal');};
        window.setLanguage=function(lang){localStorage.setItem('lang',lang);closeModal('language-modal');showNotification('Language','Updated');};
        window.openLanguageModal=function(){openModal('language-modal');};
        
        let deferredPrompt; window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-button').style.display='flex';document.getElementById('install-banner').style.display='flex';});
        window.installApp=function(){if(deferredPrompt){deferredPrompt.prompt();}else{alert('Use browser menu → Install app');}};
        document.getElementById('bannerInstallBtn')?.addEventListener('click',()=>installApp());
        document.getElementById('bannerCloseBtn')?.addEventListener('click',()=>document.getElementById('install-banner').style.display='none');
        
        setInterval(()=>{document.getElementById('online-count-badge').innerText=Math.floor(Math.random()*12)+3;},30000);
        renderAll();
    </script>
</body>
</html>
