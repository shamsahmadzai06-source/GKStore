<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    
    <!-- PWA Required Meta Tags -->
    <meta name="theme-color" content="#ec4899">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GK Store">
    <meta name="application-name" content="GK Store">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    
    <link rel="manifest" href="manifest.json">
    <title>GK Store · PUBG accounts</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">
    <script src="https://unpkg.com/pocketbase@0.21.0/dist/pocketbase.umd.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #ec4899;
            --primary-dark: #db2777;
            --secondary: #8b5cf6;
            --background: #0a0a0f;
            --surface: #16161f;
            --surface-light: #1f1f2b;
            --surface-lighter: #2a2a36;
            --text: #ffffff;
            --text-secondary: #a0a0b0;
            --border: #2a2a36;
            --gradient-primary: linear-gradient(135deg, #ec4899, #8b5cf6);
            --gradient-small: linear-gradient(135deg, #10b981, #059669);
            --gradient-medium: linear-gradient(135deg, #f59e0b, #d97706);
            --gradient-big: linear-gradient(135deg, #ef4444, #dc2626);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--background);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Video Player Styles */
        .video-player-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .video-player-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        
        .video-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .video-error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 15px 25px;
            border-radius: 30px;
            color: white;
            text-align: center;
            z-index: 10;
        }
        
        .retry-btn {
            background: var(--primary);
            border: none;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            margin-top: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        /* Swipe Ads Styles */
        .swipe-ads {
            width: 100%;
            border-radius: 2rem;
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--border);
            margin: 20px 0;
        }
        
        .slider-container {
            position: relative;
            width: 100%;
            overflow: hidden;
        }
        
        .slider-track {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        .slider-track::-webkit-scrollbar {
            display: none;
        }
        
        .slide {
            flex: 0 0 100%;
            scroll-snap-align: start;
            position: relative;
            aspect-ratio: 16/9;
            background: #000;
        }
        
        .slide img, .slide video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .slide-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
            padding: 2rem 1rem 1rem;
            font-weight: 600;
        }
        
        .slider-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: var(--surface-light);
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 10px;
            background: var(--text-secondary);
            transition: 0.2s;
            cursor: pointer;
        }
        
        .dot.active {
            background: var(--primary);
            width: 24px;
        }

        /* Rest of your styles - keeping them compact but functional */
        .top-nav {
            background: rgba(22, 22, 31, 0.98);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            padding: 0.7rem 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .logo-icon {
            width: 2.2rem;
            height: 2.2rem;
            background: var(--gradient-primary);
            border-radius: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .nav-btn {
            background: var(--surface-light);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .update-btn {
            background: var(--gradient-primary);
            border: none;
            color: white;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(22, 22, 31, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px;
            z-index: 1000;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
        }

        .bottom-nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
        }

        .bottom-nav-btn.active {
            color: var(--primary);
            background: rgba(236, 72, 153, 0.1);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 80px;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .accounts-grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: 1fr;
        }

        @media (min-width: 640px) {
            .accounts-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .account-card {
            background: var(--surface);
            border-radius: 1rem;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .card-media {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: #1a1a24;
            cursor: pointer;
        }

        .card-content {
            padding: 1rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .card-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin: 0.5rem 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            background: var(--surface-lighter);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            margin: 0.5rem 0;
        }

        .usd-price { color: var(--primary); font-weight: bold; }
        .afn-price { color: var(--secondary); }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.3rem;
        }

        .action-btn {
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 0;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            cursor: pointer;
            color: var(--text);
        }

        .action-btn.buy {
            background: var(--gradient-primary);
            border: none;
            color: white;
        }

        .hidden { display: none !important; }
        
        .input { 
            width:100%; 
            padding:0.8rem; 
            background:var(--surface-light); 
            border:1px solid var(--border); 
            border-radius:12px; 
            color:white; 
            margin-bottom:0.8rem; 
        }

        .tier-badge {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 600;
        }

        .tier-badge.small { background: var(--gradient-small); color: white; }
        .tier-badge.medium { background: var(--gradient-medium); color: white; }
        .tier-badge.big { background: var(--gradient-big); color: white; }

        .tier-header {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin: 1.5rem 0;
        }

        .tier-tab {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.7rem 1rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            flex: 1 0 auto;
            text-align: center;
        }

        .tier-tab.active {
            background: var(--gradient-primary);
            color: white;
            border-color: transparent;
        }

        .modal-overlay {
            position: fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(5px);
            z-index:2000; display:flex; align-items:center; justify-content:center; padding:1rem;
        }

        .modal {
            background:var(--surface); border-radius:1.5rem; max-width:500px; width:100%; border:1px solid var(--border);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding:1rem;
            border-bottom:1px solid var(--border);
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .modal-close { background:none; border:none; color:white; font-size:1.5rem; cursor:pointer; }

        .modal-body { padding:1rem; }
        .modal-footer { padding:1rem; display:flex; gap:0.8rem; }

        .btn {
            padding:0.8rem 1.5rem; border-radius:2rem; font-weight:600; border:none; cursor:pointer; flex:1;
            background: var(--surface-light); color:white; border:1px solid var(--border);
        }

        .btn-primary { background:var(--gradient-primary); color:white; border:none; }
        .whatsapp-btn { background: #25D366; color:white; border:none; }

        .media-preview {
            width: 100%;
            min-height: 150px;
            border-radius: 12px;
            border: 2px dashed var(--primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: var(--surface-lighter);
        }
        
        .media-preview img, .media-preview video {
            max-width: 100%;
            max-height: 200px;
            object-fit: contain;
        }

        .upload-btn {
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 3rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .install-btn-fixed {
            position: fixed;
            bottom: 80px;
            left: 0;
            right: 0;
            margin: 0 auto;
            width: fit-content;
            z-index: 9999;
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .online-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(22, 22, 31, 0.9);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid var(--border);
            font-size: 0.9rem;
        }
        
        .status-dot-badge {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #f59e0b;
        }
        
        .status-dot-badge.connected { background: #10b981; }
        .status-dot-badge.offline { background: #ef4444; }
        
        .big-title {
            font-size: 2rem;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .cta-button {
            background: var(--gradient-primary);
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 1rem;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            margin: 20px 0;
        }
        
        .title-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
    </style>
</head>

            <div class="modal-footer">
                <button class="btn" onclick="closeModal('buy-modal')">Cancel</button>

        </div>

    <div id="info-modal" class="modal-overlay hidden" onclick="closeModal('info-modal')">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header"><h3>Account Details</h3><button class="modal-close" onclick="closeModal('info-modal')">&times;</button></div>
            <div class="modal-body" id="info-modal-body"></div>
        </div>
    </div>

    <div id="book-modal" class="modal-overlay hidden" onclick="closeModal('book-modal')">

            <div class="modal-header"><h3>Book Account</h3><button class="modal-close" onclick="closeModal('book-modal')">&times;</button></div>

            <div class="modal-footer">
                <button class="btn" onclick="closeModal('book-modal')">Cancel</button>
                <button class="btn-primary" onclick="submitBooking()">Confirm</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
    <script>
        // ============================================
        // CONFIGURATION - UPDATE THIS WITH YOUR VPS URL
        // ============================================
        // CHANGE THIS TO YOUR ACTUAL VPS IP OR DOMAIN
        const YOUR_VPS_URL = 'http://216.126.225.4';  // <-- PUT YOUR VPS IP HERE
        const PB_URL = YOUR_VPS_URL;
        const pb = new PocketBase(PB_URL);
        
        // ============================================
        // FIXED VIDEO PLAYER
        // ============================================
        async function setupVideoPlayer(container, videoUrl) {
            if (!container) return;
            container.innerHTML = '';
            
            const wrapper = document.createElement('div');
            wrapper.className = 'video-player-container';
            wrapper.style.position = 'relative';
            wrapper.style.width = '100%';
            wrapper.style.height = '100%';
            
            const video = document.createElement('video');
            video.controls = true;
            video.playsInline = true;
            video.webkitPlaysInline = true;
            video.preload = 'metadata';
            video.style.width = '100%';
            video.style.height = '100%';
            video.style.objectFit = 'contain';
            video.style.backgroundColor = '#000';
            
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'video-loading';
            loadingDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading video...';
            loadingDiv.style.display = 'flex';
            
            wrapper.appendChild(video);
            wrapper.appendChild(loadingDiv);
            container.appendChild(wrapper);
            
            let retryCount = 0;
            const maxRetries = 3;
            
            function loadVideo() {
                loadingDiv.style.display = 'flex';
                loadingDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading video...';
                
                // Try direct fetch with blob
                fetch(videoUrl, {
                    mode: 'cors',
                    headers: {
                        'Accept': 'video/mp4,video/*'
                    }
                })
                .then(response => {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.blob();
                })
                .then(blob => {
                    const blobUrl = URL.createObjectURL(blob);
                    video.src = blobUrl;
                    
                    video.oncanplay = () => {
                        loadingDiv.style.display = 'none';
                        setTimeout(() => URL.revokeObjectURL(blobUrl), 30000);
                    };
                    
                    video.onerror = () => {
                        URL.revokeObjectURL(blobUrl);
                        if (retryCount < maxRetries) {
                            retryCount++;
                            setTimeout(loadVideo, 1000);
                        } else {
                            loadingDiv.innerHTML = '<div>⚠️ Video unavailable<br><button class="retry-btn" onclick="this.parentElement.parentElement.querySelector(\'video\').load()">Retry</button></div>';
                        }
                    };
                })
                .catch(error => {
                    console.error('Fetch error:', error);
                    if (retryCount < maxRetries) {
                        retryCount++;
                        setTimeout(loadVideo, 1000);
                    } else {
                        loadingDiv.innerHTML = '<div>⚠️ Network error<br><button class="retry-btn" onclick="location.reload()">Reload</button></div>';
                    }
                });
            }
            
            loadVideo();
            
            video.muted = true;
            video.play().catch(e => console.log('Autoplay blocked'));
            
            video.addEventListener('ended', () => {
                video.currentTime = 0;
                video.play().catch(() => {});
            });
        }

        // ============================================
        // APP STATE
        // ============================================
        let accounts = [];
        let ads = [];
        let currentFilter = 'all';
        let isAdminLoggedIn = false;
        let currentAccount = null;
        let currentMediaFile = null;
        let isConnected = false;
        let usdtAddress = 'TYpeauzqbVusejMAhJPnXuSb7wY6p69ZoY';
        let currentLanguage = 'en';
        let autoSlideInterval = null;
        
        const translations = {
            en: { book: 'Book', buy: 'Buy', info: 'Info', delete: 'Delete', edit: 'Edit' },
            ps: { book: 'بوک', buy: 'پیرل', info: 'مالومات', delete: 'ړنګول', edit: 'سمول' },
            fa: { book: 'رزرو', buy: 'خرید', info: 'اطلاعات', delete: 'حذف', edit: 'ویرایش' }
        };
        
        function t(key) {
            return translations[currentLanguage][key] || translations.en[key] || key;
        }
        
        function setLanguage(lang) {
            currentLanguage = lang;
            localStorage.setItem('gk_language', lang);
            document.body.dir = (lang === 'ps' || lang === 'fa') ? 'rtl' : 'ltr';
            renderAccounts();
            closeModal('language-modal');
        }
        
        function openLanguageModal() {
            document.getElementById('language-modal').classList.remove('hidden');
        }
        
        // ============================================
        // LOAD ACCOUNTS FROM POCKETBASE
        // ============================================
        async function loadAccounts() {
            try {
                const records = await pb.collection('accounts').getFullList({ sort: '-created' });
                if (records && records.length) {
                    accounts = records.map(r => ({
                        id: r.id,
                        title: r.title,
                        desc: r.description,
                        tier: r.tier,
                        price_usd: r.price_usd,
                        price_afn: r.price_afn,
                        media: pb.files.getUrl(r, r.media),
                        mediaType: r.mediaType || 'image'
                    }));
                    localStorage.setItem('gk_accounts', JSON.stringify(accounts));
                    renderAccounts();
                }
                isConnected = true;
                document.getElementById('status-dot').className = 'status-dot-badge connected';
                document.getElementById('status-text').textContent = 'Online';
            } catch(e) {
                console.log('Using cached accounts');
                isConnected = false;
                document.getElementById('status-dot').className = 'status-dot-badge offline';
                document.getElementById('status-text').textContent = 'Offline';
                const cached = localStorage.getItem('gk_accounts');
                if (cached) {
                    accounts = JSON.parse(cached);
                    renderAccounts();
                }
            }
        }
        
        // ============================================
        // RENDER ACCOUNTS
        // ============================================
        function renderAccounts() {
            const grid = document.getElementById('accounts-grid');
            if (!grid) return;
            
            let filtered = accounts;
            if (currentFilter !== 'all') {
                filtered = accounts.filter(a => a.tier === currentFilter);
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div style="text-align:center; padding:2rem;">No accounts available</div>';
                return;
            }
            
            grid.innerHTML = filtered.map(acc => {
                const mediaHtml = acc.mediaType === 'video' 
                    ? `<div id="video-${acc.id}" style="width:100%; height:100%;"></div>`
                    : `<img src="${acc.media}" class="card-media" onclick="openFullscreenImage('${acc.media}')">`;
                    
                return `
                    <div class="account-card">
                        <div style="width:100%; aspect-ratio:16/9; background:#000;">
                            ${mediaHtml}
                        </div>
                        <div class="card-content">
                            <div class="card-title">
                                ${escapeHtml(acc.title)}
                                <span class="tier-badge ${acc.tier}">${acc.tier}</span>
                            </div>
                            <div class="card-desc">${escapeHtml(acc.desc || '')}</div>
                            <div class="price-row">
                                <span class="usd-price">$${acc.price_usd}</span>
                                <span class="afn-price">${acc.price_afn} AFN</span>
                            </div>
                            <div class="action-buttons">
                                <button class="action-btn" onclick="bookAccount('${acc.id}')"><i class="fa fa-bookmark"></i> ${t('book')}</button>
                                <button class="action-btn buy" onclick="buyAccount('${acc.id}')"><i class="fa fa-bolt"></i> ${t('buy')}</button>
                                <button class="action-btn" onclick="infoAccount('${acc.id}')"><i class="fa fa-info"></i> ${t('info')}</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Setup videos after render
            setTimeout(() => {
                filtered.forEach(acc => {
                    if (acc.mediaType === 'video') {
                        const container = document.getElementById(`video-${acc.id}`);
                        if (container) {
                            setupVideoPlayer(container, acc.media);
                        }
                    }
                });
            }, 100);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m] || m);
        }
        
        function filterAccounts(tier) {
            currentFilter = tier;
            document.querySelectorAll('.tier-tab').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tier-tab[data-tier="${tier}"]`).classList.add('active');
            renderAccounts();
        }
        
        function switchScreen(screen) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`${screen}-screen`).classList.add('active');
            document.querySelectorAll('.bottom-nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`nav-${screen}`).classList.add('active');
            if (screen === 'accounts') renderAccounts();
        }
        
        // ============================================
        // SWIPE ADS
        // ============================================
        function loadAds() {
            const savedAds = localStorage.getItem('gk_ads');
            if (savedAds) {
                ads = JSON.parse(savedAds);
            } else {
                ads = [
                    { type: 'image', data: 'https://via.placeholder.com/800x450/ec4899/white?text=GK+Store', caption: 'Welcome to GK Store!' },
                    { type: 'image', data: 'https://via.placeholder.com/800x450/8b5cf6/white?text=Best+PUBG+Accounts', caption: 'Best PUBG Accounts' }
                ];
            }
            renderAdsSlider();
        }
        
        function renderAdsSlider() {
            const container = document.getElementById('ads-slider');
            if (!container) return;
            
            if (ads.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:1rem;">No ads</div>';
                return;
            }
            
            let slides = '';
            ads.forEach((ad, i) => {
                if (ad.type === 'video') {
                    slides += `<div class="slide"><video src="${ad.data}" controls style="width:100%; height:100%; object-fit:cover;"></video><div class="slide-caption">${escapeHtml(ad.caption)}</div></div>`;
                } else {
                    slides += `<div class="slide"><img src="${ad.data}" alt="ad"><div class="slide-caption">${escapeHtml(ad.caption)}</div></div>`;
                }
            });
            
            let dots = '';
            ads.forEach((_, i) => {
                dots += `<span class="dot ${i === 0 ? 'active' : ''}" onclick="jumpToSlide(${i})"></span>`;
            });
            
            container.innerHTML = `
                <div class="slider-container">
                    <div class="slider-track" id="slider-track">${slides}</div>
                    <div class="slider-dots">${dots}</div>
                </div>
            `;
            
            // Auto slide
            if (autoSlideInterval) clearInterval(autoSlideInterval);
            autoSlideInterval = setInterval(() => {
                const track = document.getElementById('slider-track');
                if (!track || ads.length === 0) return;
                const slideWidth = track.clientWidth;
                const currentIndex = Math.round(track.scrollLeft / slideWidth);
                const nextIndex = (currentIndex + 1) % ads.length;
                track.scrollTo({ left: nextIndex * slideWidth, behavior: 'smooth' });
                document.querySelectorAll('.dot').forEach((d, i) => {
                    d.classList.toggle('active', i === nextIndex);
                });
            }, 3000);
            
            // Add scroll listener
            const track = document.getElementById('slider-track');
            if (track) {
                track.addEventListener('scroll', () => {
                    const idx = Math.round(track.scrollLeft / track.clientWidth);
                    document.querySelectorAll('.dot').forEach((d, i) => {
                        d.classList.toggle('active', i === idx);
                    });
                });
            }
        }
        
        function jumpToSlide(idx) {
            const track = document.getElementById('slider-track');
            if (track) {
                track.scrollTo({ left: idx * track.clientWidth, behavior: 'smooth' });
            }
        }
        
        // ============================================
        // ACCOUNT ACTIONS
        // ============================================
        function bookAccount(id) {
            const acc = accounts.find(a => a.id === id);
            if (!acc) return;
            currentAccount = acc;
            document.getElementById('book-modal-body').innerHTML = `
                <p><strong>${escapeHtml(acc.title)}</strong> - $${acc.price_usd}</p>
                <input type="text" id="book-name" class="input" placeholder="Your name">
                <input type="tel" id="book-phone" class="input" placeholder="WhatsApp number">
            `;
            openModal('book-modal');
        }
        
        function submitBooking() {
            const name = document.getElementById('book-name')?.value;
            const phone = document.getElementById('book-phone')?.value;
            if (!name || !phone) {
                alert('Please enter name and phone');
                return;
            }
            alert(`Booking submitted for ${currentAccount.title}! We'll contact you on ${phone}`);
            closeModal('book-modal');
        }
        
        function buyAccount(id) {
            const acc = accounts.find(a => a.id === id);
            if (!acc) return;
            currentAccount = acc;
            document.getElementById('buy-modal-body').innerHTML = `
                <p><strong>${escapeHtml(acc.title)}</strong></p>
                <p>Price: <strong>$${acc.price_usd}</strong> / ${acc.price_afn} AFN</p>
                <p>Send USDT (TRC20) to:</p>
                <code style="display:block; background:#2a2a36; padding:1rem; border-radius:1rem; word-break:break-all;">${usdtAddress}</code>
                <button class="btn" style="margin-top:10px;" onclick="copyAddress()">Copy Address</button>
            `;
            openModal('buy-modal');
        }
        
        function copyAddress() {
            navigator.clipboard.writeText(usdtAddress);
            alert('Address copied!');
        }
        
        function confirmBuy() {
            if (!currentAccount) return;
            const msg = `I want to buy: ${currentAccount.title} for $${currentAccount.price_usd}`;
            window.open(`https://wa.me/93793066322?text=${encodeURIComponent(msg)}`, '_blank');
            closeModal('buy-modal');
        }
        
        function infoAccount(id) {
            const acc = accounts.find(a => a.id === id);
            if (!acc) return;
            document.getElementById('info-modal-body').innerHTML = `
                <p><strong>${escapeHtml(acc.title)}</strong></p>
                <p>${escapeHtml(acc.desc || 'Premium PUBG account')}</p>
                <p>💰 $${acc.price_usd} / ${acc.price_afn} AFN</p>
            `;
            openModal('info-modal');
        }
        
        // ============================================
        // ADMIN FUNCTIONS
        // ============================================
        async function adminLogin() {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-password').value;
            
            try {
                await pb.admins.authWithPassword(email, pass);
                isAdminLoggedIn = true;
                document.getElementById('admin-login-section').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                await loadAccounts();
            } catch(e) {
                alert('Invalid credentials');
            }
        }
        
        function logout() {
            pb.authStore.clear();
            isAdminLoggedIn = false;
            document.getElementById('admin-login-section').classList.remove('hidden');
            document.getElementById('admin-dashboard').classList.add('hidden');
            switchScreen('main');
        }
        
        function previewMedia() {
            const file = document.getElementById('account-media-file').files[0];
            const preview = document.getElementById('media-preview');
            const btn = document.getElementById('upload-btn');
            
            if (!file) {
                btn.disabled = true;
                preview.innerHTML = '<i class="fas fa-cloud-upload-alt"></i>';
                return;
            }
            
            const isVideo = file.type.startsWith('video/');
            const maxSize = isVideo ? 200 * 1024 * 1024 : 10 * 1024 * 1024;
            
            if (file.size > maxSize) {
                alert(`File too large. Max: ${isVideo ? '200MB' : '10MB'}`);
                btn.disabled = true;
                return;
            }
            
            btn.disabled = false;
            currentMediaFile = file;
            
            const reader = new FileReader();
            reader.onload = e => {
                if (isVideo) {
                    preview.innerHTML = `<video src="${e.target.result}" controls style="max-height:200px;"></video>`;
                } else {
                    preview.innerHTML = `<img src="${e.target.result}" style="max-height:200px;">`;
                }
            };
            reader.readAsDataURL(file);
        }
        
        async function uploadAccount() {
            const tier = document.getElementById('account-tier').value;
            const title = document.getElementById('account-title').value.trim();
            const desc = document.getElementById('account-description').value.trim() || 'Premium PUBG account';
            const priceUsd = parseFloat(document.getElementById('account-price-usd').value);
            const priceAfn = parseInt(document.getElementById('account-price-afn').value);
            const file = currentMediaFile;
            
            if (!tier || !title || !priceUsd || !priceAfn || !file) {
                alert('Please fill all fields');
                return;
            }
            
            const isVideo = file.type.startsWith('video/');
            
            try {
                const formData = new FormData();
                formData.append('title', title);
                formData.append('description', desc);
                formData.append('tier', tier);
                formData.append('price_usd', priceUsd);
                formData.append('price_afn', priceAfn);
                formData.append('media', file);
                formData.append('mediaType', isVideo ? 'video' : 'image');
                
                await pb.collection('accounts').create(formData);
                alert('Account uploaded successfully!');
                closeModal('add-account-modal');
                await loadAccounts();
                
                // Reset form
                document.getElementById('account-title').value = '';
                document.getElementById('account-description').value = '';
                document.getElementById('account-price-usd').value = '';
                document.getElementById('account-price-afn').value = '';
                document.getElementById('account-media-file').value = '';
                document.getElementById('media-preview').innerHTML = '<i class="fas fa-cloud-upload-alt"></i>';
                currentMediaFile = null;
                document.getElementById('upload-btn').disabled = true;
            } catch(e) {
                alert('Upload failed: ' + e.message);
            }
        }
        
        function showAddAccountModal() {
            openModal('add-account-modal');
        }
        
        function openModal(id) {
            document.getElementById(id).classList.remove('hidden');
        }
        
        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }
        
        function openFullscreenImage(src) {
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.right = '0';
            modal.style.bottom = '0';
            modal.style.background = 'rgba(0,0,0,0.95)';
            modal.style.zIndex = '10000';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            modal.style.cursor = 'pointer';
            
            const img = document.createElement('img');
            img.src = src;
            img.style.maxWidth = '90%';
            img.style.maxHeight = '90%';
            img.style.objectFit = 'contain';
            
            modal.appendChild(img);
            modal.onclick = () => modal.remove();
            document.body.appendChild(modal);
        }
        
        async function checkForUpdates() {
            const btn = document.getElementById('update-btn');
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';
            btn.disabled = true;
            await loadAccounts();
            btn.innerHTML = original;
            btn.disabled = false;
            alert('Updated!');
        }
        
        // ============================================
        // INITIALIZATION
        // ============================================
        const savedLang = localStorage.getItem('gk_language') || 'en';
        setLanguage(savedLang);
        loadAccounts();
        loadAds();
        document.getElementById('nav-main').classList.add('active');
        
        // Make functions global
        window.switchScreen = switchScreen;
        window.filterAccounts = filterAccounts;
        window.bookAccount = bookAccount;
        window.buyAccount = buyAccount;
        window.infoAccount = infoAccount;
        window.adminLogin = adminLogin;
        window.logout = logout;
        window.showAddAccountModal = showAddAccountModal;
        window.uploadAccount = uploadAccount;
        window.previewMedia = previewMedia;
        window.closeModal = closeModal;
        window.openFullscreenImage = openFullscreenImage;
        window.jumpToSlide = jumpToSlide;
        window.setLanguage = setLanguage;
        window.openLanguageModal = openLanguageModal;
        window.checkForUpdates = checkForUpdates;
        window.copyAddress = copyAddress;
        window.confirmBuy = confirmBuy;
        window.submitBooking = submitBooking;
    </script>
</body>
