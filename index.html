<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    
    <!-- PWA Required Meta Tags -->
    <meta name="theme-color" content="#ec4899">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GK Store">
    <meta name="application-name" content="GK Store">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- PWA Manifest (inline for all-in-one) -->
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22GK%20Store%20-%20PUBG%20Accounts%22%2C%22short_name%22%3A%22GK%20Store%22%2C%22description%22%3A%22Buy%20and%20sell%20PUBG%20accounts%20securely%22%2C%22start_url%22%3A%22%2FGKStore%2F%22%2C%22scope%22%3A%22%2FGKStore%2F%22%2C%22display%22%3A%22standalone%22%2C%22orientation%22%3A%22portrait%22%2C%22theme_color%22%3A%22%23ec4899%22%2C%22background_color%22%3A%22%230a0a0f%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Fvia.placeholder.com%2F192%2Fec4899%2Fffffff%3Ftext%3DGK%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fpng%22%2C%22purpose%22%3A%22any%20maskable%22%7D%2C%7B%22src%22%3A%22https%3A%2F%2Fvia.placeholder.com%2F512%2Fec4899%2Fffffff%3Ftext%3DGK%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%2C%22purpose%22%3A%22any%20maskable%22%7D%5D%7D">
    
    <title>GK Store · PUBG accounts</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- intl-tel-input -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">
    
    <!-- PocketBase SDK -->
    <script src="https://unpkg.com/pocketbase@0.21.0/dist/pocketbase.umd.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #ec4899;
            --primary-dark: #db2777;
            --secondary: #8b5cf6;
            --background: #0a0a0f;
            --surface: #16161f;
            --surface-light: #1f1f2b;
            --surface-lighter: #2a2a36;
            --text: #ffffff;
            --text-secondary: #a0a0b0;
            --border: #2a2a36;
            --gradient-primary: linear-gradient(135deg, #ec4899, #8b5cf6);
            --gradient-small: linear-gradient(135deg, #10b981, #059669);
            --gradient-medium: linear-gradient(135deg, #f59e0b, #d97706);
            --gradient-big: linear-gradient(135deg, #ef4444, #dc2626);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--background);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            padding-bottom: 70px;
        }

        .top-nav {
            background: rgba(22, 22, 31, 0.98);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            padding: 0.7rem 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .logo-icon {
            width: 2.2rem;
            height: 2.2rem;
            background: var(--gradient-primary);
            border-radius: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-actions {
            display: flex;
            gap: 8px;
        }

        .nav-btn {
            background: var(--surface-light);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        #main-screen .main-layout {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .big-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .cta-button {
            background: var(--gradient-primary);
            border: none;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 1.2rem 1.5rem;
            border-radius: 60px;
            width: 100%;
            max-width: 500px;
            margin: 1.5rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(236,72,153,0.4);
            cursor: pointer;
        }

        .swipe-ads {
            width: 100%;
            border-radius: 2rem;
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--border);
        }

        .slider-track {
            display: flex;
            overflow-x: hidden;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            background: #111;
        }

        .slider-track::-webkit-scrollbar {
            display: none;
        }

        .slide {
            flex: 0 0 100%;
            scroll-snap-align: start;
            position: relative;
            aspect-ratio: 16/9;
            background: #000;
        }

        .slide img, .slide video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slider-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: var(--surface-light);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 10px;
            background: var(--text-secondary);
            transition: 0.2s;
            cursor: pointer;
        }

        .dot.active {
            background: var(--primary);
            width: 24px;
        }

        .tier-header {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin: 1.5rem 0 2rem;
        }

        .tier-tab {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.7rem 1rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            flex: 1 0 auto;
            text-align: center;
        }

        .tier-tab.active {
            background: var(--gradient-primary);
            color: white;
            border-color: transparent;
        }

        .accounts-grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: 1fr;
            margin-top: 1rem;
        }

        @media (min-width: 640px) {
            .accounts-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .account-card {
            background: var(--surface);
            border-radius: 1rem;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .card-media {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: #1a1a24;
        }

        .card-content {
            padding: 1rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            background: var(--surface-lighter);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            margin: 0.5rem 0;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.3rem;
        }

        .action-btn {
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 0;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            cursor: pointer;
            color: var(--text);
        }

        .action-btn.buy {
            background: var(--gradient-primary);
            border: none;
            color: white;
        }

        .hidden { display: none !important; }
        
        .input { 
            width:100%; 
            padding:0.8rem; 
            background:var(--surface-light); 
            border:1px solid var(--border); 
            border-radius:12px; 
            color:white; 
            margin-bottom:0.8rem; 
        }

        .modal-overlay {
            position: fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(5px);
            z-index:2000; display:flex; align-items:center; justify-content:center; padding:1rem;
        }

        .modal {
            background:var(--surface); border-radius:1.5rem; max-width:500px; width:100%; border:1px solid var(--border);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding:1rem;
            border-bottom:1px solid var(--border);
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .modal-body { padding:1rem; }
        .modal-footer { padding:1rem; display:flex; gap:0.8rem; }

        .btn {
            padding:0.8rem 1.5rem; border-radius:2rem; font-weight:600; border:none; cursor:pointer; flex:1;
            background: var(--surface-light); color:white; border:1px solid var(--border);
        }

        .btn-primary { background:var(--gradient-primary); color:white; border:none; }

        .tier-badge {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 600;
        }

        .tier-badge.small { background: var(--gradient-small); color: white; }
        .tier-badge.medium { background: var(--gradient-medium); color: white; }
        .tier-badge.big { background: var(--gradient-big); color: white; }

        /* Install button - Always visible */
        #install-button-container {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: none;
        }

        #install-button {
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(236,72,153,0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Loading indicator */
        .loading-spinner {
            text-align: center;
            padding: 2rem;
        }

        .loading-spinner i {
            font-size: 2rem;
            color: var(--primary);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* SSL helper */
        .ssl-helper {
            position: fixed;
            bottom: 140px;
            left: 10px;
            right: 10px;
            background: var(--surface-light);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            z-index: 9998;
            font-size: 14px;
            border: 1px solid var(--primary);
        }

        .ssl-helper button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            margin: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Install Button - Always visible container -->
    <div id="install-button-container">
        <button id="install-button" onclick="showInstallPrompt()">
            <i class="fas fa-download"></i> Install App
        </button>
    </div>

    <!-- top nav -->
    <div class="top-nav">
        <div class="logo" onclick="switchScreen('main')">
            <div class="logo-icon">GK</div>
            <span class="brand-text">GK Store</span>
        </div>
        <div class="nav-actions">
            <button class="nav-btn" onclick="switchScreen('contact')"><i class="fab fa-whatsapp"></i> Contact</button>
            <button class="nav-btn" onclick="switchScreen('admin')"><i class="fa fa-user-shield"></i> Admin</button>
        </div>
    </div>

    <div class="container">
        <!-- MAIN SCREEN -->
        <div id="main-screen" class="screen active">
            <div class="main-layout">
                <h1 class="big-title">PUBG Marketplace</h1>
                <div class="sub-head">Secure · Instant delivery</div>
                <button class="cta-button" onclick="switchScreen('accounts')">
                    <i class="fa fa-gamepad"></i> See PUBG Accounts
                </button>
                <div class="swipe-ads" id="ads-slider"></div>
            </div>
        </div>

        <!-- ACCOUNT BROWSER SCREEN -->
        <div id="accounts-screen" class="screen">
            <h2 style="margin-bottom:1rem;">PUBG Accounts</h2>
            <div class="tier-header" id="tier-tabs">
                <button class="tier-tab active" data-tier="all" onclick="filterAccounts('all')">All</button>
                <button class="tier-tab" data-tier="small" onclick="filterAccounts('small')">Small</button>
                <button class="tier-tab" data-tier="medium" onclick="filterAccounts('medium')">Medium</button>
                <button class="tier-tab" data-tier="big" onclick="filterAccounts('big')">Big</button>
            </div>
            <div id="accounts-grid" class="accounts-grid">
                <div class="loading-spinner">
                    <i class="fas fa-spinner"></i>
                    <p>Loading accounts...</p>
                </div>
            </div>
        </div>

        <!-- CONTACT SCREEN -->
        <div id="contact-screen" class="screen">
            <h2>Contact & Support</h2>
            <div id="contacts-container" class="accounts-grid"></div>
        </div>

        <!-- ADMIN SCREEN (simplified) -->
        <div id="admin-screen" class="screen">
            <h2>Admin Panel</h2>
            <div style="max-width:600px; margin:0 auto;">
                <div id="admin-login-section" class="account-card" style="padding:1.5rem;">
                    <h3>Admin Login</h3>
                    <input type="email" id="admin-email" class="input" value="shamsahmadzai06@gmail.com">
                    <input type="password" id="admin-password" class="input" value="Shams12357@">
                    <button class="action-btn buy" style="width:100%;" onclick="adminLogin()">Login</button>
                    <div id="admin-error" style="color:#ef4444;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
    <script>
        // ============================================
        // OPTIMIZED PWA INSTALLATION
        // ============================================
        let deferredPrompt;
        const installContainer = document.getElementById('install-button-container');
        const installBtn = document.getElementById('install-button');
        
        // Check if already installed
        if (window.matchMedia('(display-mode: standalone)').matches) {
            installContainer.style.display = 'none';
        } else {
            // Show install button after 3 seconds
            setTimeout(() => {
                installContainer.style.display = 'block';
            }, 3000);
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installContainer.style.display = 'block';
        });

        window.showInstallPrompt = function() {
            if (!deferredPrompt) {
                alert('You can install this app from your browser menu');
                return;
            }
            
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    console.log('User accepted install');
                    installContainer.style.display = 'none';
                }
                deferredPrompt = null;
            });
        };

        // ============================================
        // POCKETBASE CONFIGURATION - OPTIMIZED
        // ============================================
        const PB_URL = 'https://216.126.225.4';
        const pb = new PocketBase(PB_URL);
        pb.autoCancellation(false);

        // ============================================
        // MOBILE DETECTION
        // ============================================
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        
        if (isMobile) {
            // Check SSL once
            fetch(PB_URL + '/api/health', { mode: 'cors', cache: 'no-cache' })
                .catch(() => {
                    const sslHelper = document.createElement('div');
                    sslHelper.className = 'ssl-helper';
                    sslHelper.innerHTML = `
                        <strong>🔒 Accept Certificate</strong>
                        <p>Click to accept SSL certificate</p>
                        <button onclick="window.open('${PB_URL}/api/health', '_blank')">Open Link</button>
                        <button onclick="this.parentElement.remove()">Close</button>
                    `;
                    document.body.appendChild(sslHelper);
                });
        }

        // ============================================
        // APP STATE (minimal)
        // ============================================
        const appState = {
            accounts: [],
            contacts: [],
            ads: [
                { type: 'image', data: 'https://images.pexels.com/photos/3165335/pexels-photo-3165335.jpeg?auto=compress&w=600', caption: '🔥 Level 500' }
            ],
            currentFilter: 'all'
        };

        // ============================================
        // FAST DATA LOADING
        // ============================================
        async function loadAccountsFromPB() {
            try {
                const records = await pb.collection('accounts').getFullList({
                    $autoCancel: false,
                    requestKey: null,
                    batch: 20 // Load only 20 at a time
                });
                
                appState.accounts = records.map(record => ({
                    id: record.id,
                    title: record.title,
                    desc: record.description,
                    tier: record.tier,
                    price_usd: record.price_usd,
                    price_afn: record.price_afn,
                    media: record.media ? pb.files.getUrl(record, record.media).replace('http://', 'https://') : '',
                    mediaType: record.mediaType || 'image'
                }));
                
                renderAccounts();
            } catch (error) {
                console.error('Failed to load accounts:', error);
                document.getElementById('accounts-grid').innerHTML = '<p style="text-align:center;padding:2rem;">Failed to load accounts</p>';
            }
        }

        // ============================================
        // RENDERING (optimized)
        // ============================================
        function renderAccounts() {
            const grid = document.getElementById('accounts-grid');
            if (!grid) return;
            
            let filtered = appState.accounts;
            if (appState.currentFilter !== 'all') {
                filtered = filtered.filter(a => a.tier === appState.currentFilter);
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = '<p style="text-align:center;padding:2rem;">No accounts available</p>';
                return;
            }
            
            // Use document fragment for better performance
            const fragment = document.createDocumentFragment();
            const tempDiv = document.createElement('div');
            
            tempDiv.innerHTML = filtered.map(acc => {
                const mediaHtml = acc.mediaType === 'video' 
                    ? `<video class="card-media" src="${acc.media}" controls playsinline preload="metadata" loading="lazy"></video>`
                    : `<img class="card-media" src="${acc.media}" alt="${acc.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/400?text=Image'">`;
                
                return `
                    <div class="account-card">
                        <div style="position:relative; width:100%; aspect-ratio:16/9; background:var(--surface-lighter);">
                            ${mediaHtml}
                        </div>
                        <div class="card-content">
                            <div class="card-title">
                                ${acc.title}
                                <span class="tier-badge ${acc.tier}">${acc.tier}</span>
                            </div>
                            <div class="card-desc">${acc.desc || ''}</div>
                            <div class="price-row">
                                <span>$${acc.price_usd}</span>
                                <span>${acc.price_afn} AFN</span>
                            </div>
                            <div class="action-buttons">
                                <button class="action-btn" onclick="alert('Booking feature coming soon')">Book</button>
                                <button class="action-btn buy" onclick="alert('Buy feature coming soon')">Buy</button>
                                <button class="action-btn" onclick="alert('${acc.desc || 'No details'}')">Info</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            while(tempDiv.firstChild) {
                fragment.appendChild(tempDiv.firstChild);
            }
            
            grid.innerHTML = '';
            grid.appendChild(fragment);
        }

        // ============================================
        // SIMPLE FUNCTIONS
        // ============================================
        window.filterAccounts = function(tier) {
            appState.currentFilter = tier;
            document.querySelectorAll('.tier-tab').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tier-tab[data-tier="${tier}"]`).classList.add('active');
            renderAccounts();
        };

        window.switchScreen = function(screen) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screen + '-screen').classList.add('active');
            if (screen === 'accounts') renderAccounts();
        };

        window.adminLogin = async function() {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-password').value;
            
            try {
                await pb.admins.authWithPassword(email, pass);
                alert('Login successful! Check PocketBase admin UI for full features');
            } catch (error) {
                document.getElementById('admin-error').innerText = 'Invalid credentials';
            }
        };

        // ============================================
        // INITIALIZATION (fast)
        // ============================================
        renderAdsSlider();
        loadAccountsFromPB();

        function renderAdsSlider() {
            const container = document.getElementById('ads-slider');
            if (!container) return;
            
            container.innerHTML = `
                <div class="slider-container">
                    <div class="slider-track" id="slider-track">
                        <div class="slide"><img src="https://images.pexels.com/photos/3165335/pexels-photo-3165335.jpeg?auto=compress&w=600"><div class="slide-caption">🔥 Level 500</div></div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
