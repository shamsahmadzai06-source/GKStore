<!-- Add this meta tag for mobile video support -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">

<!-- Update the PocketBase URL section -->
<script>
// ============================================
// POCKETBASE CONFIGURATION - WITH CORS FIX
// ============================================
const PB_URL = 'https://216.126.225.4';  // Keep as is but add CORS handling

// Improved PocketBase initialization with better error handling
const pb = new PocketBase(PB_URL);
pb.autoCancellation(false);

// Add CORS headers for all requests
pb.beforeSend = function(url, options) {
    options.headers = {
        ...options.headers,
        'Accept': 'application/json',
        'Cache-Control': 'no-cache'
    };
    return options;
};

// ============================================
// IMPROVED VIDEO HANDLING FOR MOBILE
// ============================================
function getOptimalVideoUrl(mediaUrl) {
    // Add cache-busting for mobile
    return mediaUrl + (mediaUrl.includes('?') ? '&' : '?') + 't=' + Date.now();
}

// Updated renderAccounts function with mobile-optimized video
function renderAccounts() {
    const grid = document.getElementById('accounts-grid');
    if (!grid) return;
    
    let filtered = appState.accounts;
    if (appState.currentFilter !== 'all') {
        filtered = filtered.filter(a => a.tier === appState.currentFilter);
    }
    
    if (filtered.length === 0) {
        grid.innerHTML = '<div style="text-align:center; padding:2rem;">No accounts available</div>';
        return;
    }
    
    const t = translations[appState.currentLanguage || 'en'];
    
    grid.innerHTML = filtered.map(acc => {
        // Mobile-optimized media handling
        const mediaHtml = acc.mediaType === 'video' 
            ? `<video 
                src="${getOptimalVideoUrl(acc.media)}" 
                class="card-media" 
                controls 
                playsinline
                webkit-playsinline
                preload="metadata"
                muted
                loop
                poster="${acc.thumbnail || 'https://images.pexels.com/photos/3165335/pexels-photo-3165335.jpeg?auto=compress&w=400'}"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <source src="${getOptimalVideoUrl(acc.media)}" type="video/mp4">
              </video>
              <div class="video-fallback" style="display:none; align-items:center; justify-content:center; height:100%; background:var(--surface-lighter);">
                <i class="fa fa-play-circle" style="font-size:3rem; color:var(--primary);"></i>
              </div>`
            : `<img 
                src="${acc.media}" 
                class="card-media" 
                alt="${acc.title}" 
                loading="lazy" 
                onerror="this.src='https://images.pexels.com/photos/3165335/pexels-photo-3165335.jpeg?auto=compress&w=400';">
                <div class="img-fallback" style="display:none;"></div>`;
        
        return `
            <div class="account-card" data-id="${acc.id}">
                <div style="position:relative; width:100%; aspect-ratio:16/9; background:var(--surface-lighter);">
                    ${mediaHtml}
                </div>
                <div class="card-content">
                    <div class="card-title">
                        ${acc.title}
                        <span class="tier-badge ${acc.tier}">${acc.tier}</span>
                    </div>
                    <div class="card-desc">${acc.desc || ''}</div>
                    <div class="price-row">
                        <span class="usd-price">$${acc.price_usd}</span>
                        <span class="afn-price">${acc.price_afn} AFN</span>
                    </div>
                    <div class="action-buttons">
                        <button class="action-btn" onclick="bookAccount('${acc.id}')"><i class="fa fa-bookmark"></i> ${t.bookTitle}</button>
                        <button class="action-btn buy" onclick="buyAccount('${acc.id}')"><i class="fa fa-bolt"></i> ${t.buyTitle}</button>
                        <button class="action-btn" onclick="infoAccount('${acc.id}')"><i class="fa fa-info"></i> ${t.infoTitle}</button>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

// ============================================
// IMPROVED CONNECTION TEST WITH FALLBACK
// ============================================
let isConnected = false;
let connectionStatus = document.getElementById('connection-status');
let connectionRetries = 0;
const MAX_RETRIES = 3;

async function testConnection() {
    try {
        console.log('Testing direct HTTPS connection...');
        
        // Use a timeout to prevent hanging
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);
        
        const response = await fetch(PB_URL + '/api/health', {
            signal: controller.signal,
            mode: 'cors',
            headers: {
                'Accept': 'application/json'
            }
        });
        
        clearTimeout(timeoutId);
        
        if (response.ok) {
            const data = await response.json();
            isConnected = true;
            connectionStatus.textContent = '✅ Connected';
            connectionStatus.classList.add('connected');
            connectionStatus.style.background = '#10b981';
            console.log('✅ Connected to PocketBase');
            
            loadAccountsFromPB();
            loadContactsFromPB();
            loadSettingsFromPB();
        } else {
            throw new Error('Connection failed');
        }
    } catch (error) {
        console.log('⚠️ Connection error:', error.message);
        connectionRetries++;
        
        if (connectionRetries < MAX_RETRIES) {
            connectionStatus.textContent = `🔄 Retrying (${connectionRetries}/${MAX_RETRIES})...`;
            setTimeout(testConnection, 2000);
        } else {
            connectionStatus.textContent = '⚠️ Offline mode';
            connectionStatus.style.background = '#ef4444';
            isConnected = false;
            
            // Still load from localStorage
            loadFromLocalStorage();
        }
    }
}

function loadFromLocalStorage() {
    // Load accounts from localStorage
    if (localStorage.getItem('gk_accounts')) {
        try {
            const saved = JSON.parse(localStorage.getItem('gk_accounts'));
            if (saved && saved.length > 0) {
                appState.accounts = saved;
                appState.usingFallback = false;
                renderAccounts();
            }
        } catch (e) {}
    }
    
    // Load contacts from localStorage
    if (localStorage.getItem('gk_contacts')) {
        try {
            appState.contacts = JSON.parse(localStorage.getItem('gk_contacts'));
            renderContacts();
        } catch (e) {}
    }
    
    // Load ads from localStorage
    if (localStorage.getItem('gk_ads')) {
        try {
            appState.ads = JSON.parse(localStorage.getItem('gk_ads'));
            renderAdsSlider();
        } catch (e) {}
    }
}

// ============================================
// IMPROVED SERVICE WORKER (KEEP CACHE)
// ============================================
if ('serviceWorker' in navigator) {
    // Don't unregister existing service workers
    navigator.serviceWorker.register('sw.js')
        .then(registration => {
            console.log('✅ ServiceWorker registered');
            
            // Check for updates
            registration.update();
            
            // Handle offline capability
            if (registration.active) {
                console.log('ServiceWorker active, offline support ready');
            }
        })
        .catch(error => {
            console.log('❌ ServiceWorker registration failed:', error);
        });
}

// ============================================
// IMPROVED UPLOAD FUNCTION WITH MOBILE SUPPORT
// ============================================
window.uploadNewAccount = function() {
    const tier = document.getElementById('account-tier').value;
    const title = document.getElementById('account-title').value.trim();
    const desc = document.getElementById('account-description').value.trim() || 'Premium PUBG account';
    const priceUsd = parseFloat(document.getElementById('account-price-usd').value);
    const priceAfn = parseInt(document.getElementById('account-price-afn').value);
    
    if (!tier || !title || !priceUsd || !priceAfn) {
        alert('Please fill all required fields');
        return;
    }
    
    if (!appState.currentMediaData) {
        alert('Please select an image or video');
        return;
    }
    
    const progressContainer = document.getElementById('upload-progress');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    const uploadBtn = document.getElementById('upload-btn');
    
    progressContainer.classList.add('active');
    uploadBtn.disabled = true;
    
    // Simulate upload progress
    let progress = 0;
    const interval = setInterval(() => {
        progress += Math.random() * 10;
        if (progress >= 100) progress = 100;
        progressBar.style.width = progress + '%';
        progressText.innerHTML = `Uploading... ${Math.round(progress)}%`;
    }, 200);
    
    // Save to localStorage immediately for offline access
    setTimeout(() => {
        clearInterval(interval);
        progressBar.style.width = '100%';
        progressText.innerHTML = 'Upload complete!';
        
        // Create new account with mobile-optimized data
        const newAccount = {
            id: 'a' + Date.now(),
            title: title,
            desc: desc,
            tier: tier,
            price_usd: priceUsd,
            price_afn: priceAfn,
            media: appState.currentMediaData.data,
            mediaType: appState.currentMediaData.type,
            thumbnail: appState.currentMediaData.type === 'video' ? generateThumbnail(appState.currentMediaData.data) : appState.currentMediaData.data,
            timestamp: Date.now()
        };
        
        appState.accounts.push(newAccount);
        
        // Save to localStorage
        try {
            localStorage.setItem('gk_accounts', JSON.stringify(appState.accounts));
        } catch (e) {
            // Handle quota exceeded error
            if (e.name === 'QuotaExceededError') {
                alert('Storage limit reached. Please delete some old items.');
                return;
            }
        }
        
        // If connected to PocketBase, try to sync
        if (isConnected) {
            syncToPocketBase(newAccount);
        }
        
        setTimeout(() => {
            closeModal('add-account-modal');
            renderAccounts();
            if (appState.isAdminLoggedIn) {
                document.getElementById('admin-account-count').innerText = appState.accounts.length;
            }
            alert('Account uploaded successfully!');
            
            progressContainer.classList.remove('active');
            progressBar.style.width = '0%';
            progressText.innerHTML = '';
            uploadBtn.disabled = false;
        }, 500);
    }, 2000);
};

// Helper function to generate thumbnail for videos
function generateThumbnail(videoDataUrl) {
    // Return a default thumbnail for now
    return 'https://images.pexels.com/photos/3165335/pexels-photo-3165335.jpeg?auto=compress&w=400';
}

// ============================================
// MOBILE-OPTIMIZED VIDEO PREVIEW
// ============================================
window.previewMediaFromFile = function() {
    const fileInput = document.getElementById('account-media-file');
    const preview = document.getElementById('media-preview');
    const uploadBtn = document.getElementById('upload-btn');
    
    if (fileInput.files && fileInput.files[0]) {
        const file = fileInput.files[0];
        const isVideo = file.type.startsWith('video/');
        
        // Adjusted file size limits for mobile
        const maxSize = isVideo ? 50 * 1024 * 1024 : 10 * 1024 * 1024; // 50MB for video, 10MB for image
        
        if (file.size > maxSize) {
            alert(`File too large. Max size for ${isVideo ? 'videos' : 'images'} is ${isVideo ? '50MB' : '10MB'}`);
            uploadBtn.disabled = true;
            preview.innerHTML = '<i class="fa fa-cloud-upload-alt"></i>';
            return;
        }
        
        uploadBtn.disabled = false;
        const reader = new FileReader();
        reader.onload = function(e) {
            if (isVideo) {
                // Mobile-optimized video preview
                preview.innerHTML = `
                    <video 
                        src="${e.target.result}" 
                        controls 
                        style="max-height:200px; width:100%;" 
                        playsinline
                        webkit-playsinline
                        preload="metadata">
                        <source src="${e.target.result}" type="video/mp4">
                    </video>`;
                appState.currentMediaData = { type: 'video', data: e.target.result };
            } else {
                preview.innerHTML = `<img src="${e.target.result}" alt="preview" style="max-height:200px; max-width:100%;">`;
                appState.currentMediaData = { type: 'image', data: e.target.result };
            }
        };
        reader.readAsDataURL(file);
    } else {
        uploadBtn.disabled = true;
    }
};

// ============================================
// ADD CACHE-BUSTING FOR MOBILE
// ============================================
// Add timestamp to media URLs to prevent caching issues on mobile
function getMediaUrl(baseUrl) {
    return baseUrl + (baseUrl.includes('?') ? '&' : '?') + '_t=' + Date.now();
}

// Start connection test with delay
setTimeout(testConnection, 1000);
</script>
