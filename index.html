            text-align: right;
        }
        body[dir="ltr"] {

        .bg-fixed {

            left: 0;
            width: 100%;
            height: 100%;

            right: 0;

            align-items: center;

        .fullscreen-zoom-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);

            align-items: center;

            background: rgba(0,0,0,0.7);

            height: 45px;

    function openFullscreenZoom(url,isVideo){const v=document.getElementById('fullscreenZoomViewer'),c=document.getElementById('zoomContent');if(isVideo){c.innerHTML=`<video controls autoplay playsinline style="max-width:95%;max-height:95%;"><source src="${url}" type="video/mp4"></video>`;v.classList.remove('hidden');}else{c.innerHTML=`<img id="zoomableImage" src="${url}" style="max-width:100%;max-height:100%;object-fit:contain;transform-origin:center center;">`;v.classList.remove('hidden');currentZoomImage=document.getElementById('zoomableImage');currentScale=1;if(currentZoomImage){currentZoomImage.style.transform=`scale(1)`;currentZoomImage.addEventListener('touchstart',e=>{if(e.touches.length===2){e.preventDefault();let dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;initialDistance=Math.sqrt(dx*dx+dy*dy);initialScale=currentScale;}});currentZoomImage.addEventListener('touchmove',e=>{if(e.touches.length===2&&currentZoomImage){e.preventDefault();let dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,dist=Math.sqrt(dx*dx+dy*dy);if(initialDistance>0){let newScale=initialScale*(dist/initialDistance);newScale=Math.min(Math.max(newScale,0.5),3);currentScale=newScale;currentZoomImage.style.transform=`scale(${currentScale})`;}}});currentZoomImage.addEventListener('dblclick',()=>{currentScale=1;currentZoomImage.style.transform=`scale(1)`;});}}}
