        .slide {

        }

            width: calc(100% + 30px);

        .slide-caption {

            bottom: 0;
            left: 0;

        /* book request items */
        .book-request-item {

        }
        .request-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }
        .request-actions button {
            flex: 1;
            padding: 0.5rem;
            border-radius: 2rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-wa {
            background: #25D366;
            color: white;
        }
        .btn-cancel {
            background: #ef4444;
            color: white;
        }
        
        /* User count cards */
        .user-card {
            background: var(--surface);
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            border: 1px solid var(--border);
        }
        .user-card .icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.5rem;
        }
        .user-card .count {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .user-card .label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .user-card .info {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 0.3rem;
        }
        
        /* Online indicator */
        .online-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        /* Upload button styling */
        .upload-btn {
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 3rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(236,72,153,0.4);
        }
        .upload-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Mobile-specific fixes */
        img, video {
            max-width: 100%;
            height: auto;
            display: block;
        }
        
        .card-media {
            background-color: #1a1a24;
            min-height: 200px;
            object-fit: cover;
        }
        
        /* Fallback for images that don't load */
        .card-media::part(fallback) {
            content: "📷";
            font-size: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-lighter);
        }
    </style>
</head>

        async function loadAccountsFromPB() {
            try {
                const records = await pb.collection('accounts').getFullList({
                    $autoCancel: false,
                    requestKey: null
                });
                if (records.length > 0) {
                    appState.accounts = records.map(record => {
                        // Get the media URL from PocketBase
                        let mediaUrl = '';
                        if (record.media) {
                            mediaUrl = pb.files.getUrl(record, record.media);
                            // Ensure HTTPS
                            mediaUrl = mediaUrl.replace('http://', 'https://');
                        } else {
                            mediaUrl = 'https://images.pexels.com/photos/3165335/pexels-photo-3165335.jpeg?auto=compress&w=400';
                        }
                        
                        return {
                            id: record.id,
                            title: record.title,
                            desc: record.description,
                            tier: record.tier,
                            price_usd: record.price_usd,
                            price_afn: record.price_afn,
                            media: mediaUrl,
                            mediaType: record.mediaType || 'image'
                        };
                    });
                    renderAccounts();
                }
            } catch (error) {
                console.error('Failed to load accounts from PocketBase:', error);
            }
        }

        async function loadContactsFromPB() {
            try {
                const records = await pb.collection('contacts').getFullList({
                    $autoCancel: false,
                    requestKey: null
                });
                if (records.length > 0) {
                    appState.contacts = records.map(record => ({

                        name: record.name,
                        phone: record.phone,
                        desc: record.description
                    }));
                    renderContacts();
                }
            } catch (error) {
                console.error('Failed to load contacts from PocketBase:', error);
            }
        }

                    $autoCancel: false,
                    requestKey: null
                });
                const usdtSetting = records.find(r => r.key === 'usdt_address');

                // Create image with fallback
                const mediaHtml = acc.mediaType === 'video' 
                    ? `<video src="${acc.media}" class="card-media" controls controlsList="nodownload" autoplay muted loop playsinline crossorigin="anonymous" onerror="this.parentElement.innerHTML='<div class=\'card-media\' style=\'display:flex;align-items:center;justify-content:center;background:var(--surface-lighter);\'><span style=\'font-size:3rem;\'>📷</span></div>'"></video>`
                    : `<img src="${acc.media}" class="card-media" alt="${acc.title}" crossorigin="anonymous" onerror="this.onerror=null; this.src='https://images.pexels.com/photos/3165335/pexels-photo-3165335.jpeg?auto=compress&w=400'; this.setAttribute('data-failed', 'true');">`;
                
                return `
                    <div class="account-card" data-id="${acc.id}">
                        <div class="media-container" style="position:relative; width:100%; aspect-ratio:16/9; overflow:hidden; background:var(--surface-lighter);">
                            ${mediaHtml}
                        </div>
                        <div class="card-content">
                            <div class="card-title">
                                ${acc.title}
                                <span class="tier-badge ${acc.tier}">${acc.tier}</span>
                            </div>
                            <div class="card-desc">${acc.desc || 'Premium PUBG account'}</div>
                            <div class="price-row">
                                <span class="usd-price">$${acc.price_usd.toFixed(2)}</span>
                                <span class="afn-price">${acc.price_afn.toLocaleString()} AFN</span>
                            </div>
                            <div class="action-buttons">
                                <button class="action-btn" onclick="bookAccount('${acc.id}')"><i class="fa fa-bookmark"></i> ${t.bookTitle}</button>
                                <button class="action-btn buy" onclick="buyAccount('${acc.id}')"><i class="fa fa-bolt"></i> ${t.buyTitle}</button>
                                <button class="action-btn" onclick="infoAccount('${acc.id}')"><i class="fa fa-info"></i> ${t.infoTitle}</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // After rendering, fix any remaining image issues
            setTimeout(fixMobileImages, 500);
        }

        // Mobile-specific image fix
        function fixMobileImages() {
            const images = document.querySelectorAll('.card-media');
            images.forEach(img => {
                // Force reload on mobile
                if (navigator.userAgent.match(/Android|iPhone|iPad|iPod/i)) {
                    const src = img.src;
                    if (src && !img.complete) {
                        // Image is still loading or failed
                        img.onerror = function() {
                            this.src = 'https://images.pexels.com/photos/3165335/pexels-photo-3165335.jpeg?auto=compress&w=400';
                        };
                    }
                }
            });
        }

        // ============================================
        // REMAINING FUNCTIONS (keep all your existing code)
        // ============================================
        // ... (keep all your other functions exactly as they are) ...

        // ============================================
        // INITIALIZATION
        // ============================================
        const savedLang = localStorage.getItem('gk_language') || 'en';
        applyTranslation(savedLang);
        renderAdsSlider();
        renderContacts();
        renderAccounts();
        
        // Load data from PocketBase
        loadAccountsFromPB();
        loadContactsFromPB();
        loadSettingsFromPB();
        
        trackVisitor();
        setInterval(trackVisitor, 30000);
        setInterval(() => {
            if (document.visibilityState === 'visible') {
                trackVisitor();
            }
        }, 60000);

        // Mobile-specific SSL certificate acceptance guide
        if (navigator.userAgent.match(/Android|iPhone|iPad|iPod/i)) {
            console.log('📱 Mobile device detected. If images don\'t load, visit: ' + PB_URL + '/api/health and accept the certificate');
            
            // Show a helpful message after 3 seconds if no accounts loaded
            setTimeout(() => {
                if (appState.accounts.length === 0) {
                    const msg = document.createElement('div');
                    msg.style.cssText = 'position:fixed; bottom:80px; left:10px; right:10px; background:var(--primary); color:white; padding:1rem; border-radius:1rem; text-align:center; z-index:1000;';
                    msg.innerHTML = '📱 On mobile, please visit <strong>' + PB_URL + '/api/health</strong> in this browser and accept the certificate to see images.';
                    document.body.appendChild(msg);
                    setTimeout(() => msg.remove(), 10000);
                }
            }, 3000);
        }
    </script>
</body>
</html>
