        // ============================================

        function applyTranslation(lang) {
            const t = translations[lang] || translations.en;
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) {
                    el.textContent = t[key];
                }
            });

            document.documentElement.lang = lang;
            document.body.dir = (lang === 'ps' || lang === 'fa') ? 'rtl' : 'ltr';
            
            appState.currentLanguage = lang;
            localStorage.setItem('gk_language', lang);
            
            renderAccounts();
            renderContacts();
            renderAdsSlider();
            if (appState.isAdminLoggedIn) renderBookRequests();
            
            const usdtEl = document.getElementById('current-usdt-address');
            if (usdtEl) usdtEl.innerText = appState.usdtAddress;
        }

        function setLanguage(lang) {
            applyTranslation(lang);
            closeModal('language-modal');
        }

        function trackVisitor() {
            fetch('https://api.ipify.org?format=json')
                .then(response => response.json())
                .then(data => {
                    const ip = data.ip;
                    const now = Date.now();
                    
                    appState.uniqueVisitors.add(ip);
                    appState.visitorCount = appState.uniqueVisitors.size;
                    localStorage.setItem('gk_visitors', JSON.stringify([...appState.uniqueVisitors]));
                    
                    appState.activeSessions.set(ip, now);
                    for (let [sessionIp, time] of appState.activeSessions.entries()) {
                        if (now - time > 300000) {
                            appState.activeSessions.delete(sessionIp);
                        }
                    }
                    appState.onlineCount = appState.activeSessions.size;
                    
                    localStorage.setItem('gk_sessions', JSON.stringify([...appState.activeSessions]));
                    
                    document.getElementById('unique-visitor-count').innerText = appState.visitorCount;
                    document.getElementById('online-user-count').innerText = appState.onlineCount;
                    document.getElementById('active-sessions-count').innerText = appState.onlineCount;
                })
                .catch(() => {
                    let sessionId = localStorage.getItem('gk_session_id');
                    if (!sessionId) {
                        sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                        localStorage.setItem('gk_session_id', sessionId);
                    }
                    
                    const now = Date.now();
                    
                    appState.uniqueVisitors.add(sessionId);
                    appState.visitorCount = appState.uniqueVisitors.size;
                    localStorage.setItem('gk_visitors', JSON.stringify([...appState.uniqueVisitors]));
                    
                    appState.activeSessions.set(sessionId, now);
                    for (let [sessionIp, time] of appState.activeSessions.entries()) {
                        if (now - time > 300000) {
                            appState.activeSessions.delete(sessionIp);
                        }
                    }
                    appState.onlineCount = appState.activeSessions.size;
                    localStorage.setItem('gk_sessions', JSON.stringify([...appState.activeSessions]));
                    
                    document.getElementById('unique-visitor-count').innerText = appState.visitorCount;
                    document.getElementById('online-user-count').innerText = appState.onlineCount;
                    document.getElementById('active-sessions-count').innerText = appState.onlineCount;
                });
        }

        // ============================================
        async function loadAccountsFromPB() {
            try {
                const records = await pb.collection('accounts').getFullList({
                    $autoCancel: false,
                    requestKey: null
                });
                
                if (records.length > 0) {
                    appState.accounts = records.map(record => {
                        let mediaUrl = '';
                        if (record.media) {
                            mediaUrl = pb.files.getUrl(record, record.media);
                            mediaUrl = mediaUrl.replace('http://', 'https://');
                        } else {
                            mediaUrl = 'https://images.pexels.com/photos/3165335/pexels-photo-3165335.jpeg?auto=compress&w=400';
                        }
                        
                        return {
                            id: record.id,
                            title: record.title,
                            desc: record.description,
                            tier: record.tier,
                            price_usd: record.price_usd,
                            price_afn: record.price_afn,
                            media: mediaUrl,
                            mediaType: record.mediaType || 'image'
                        };
                    });
                    renderAccounts();
                }
            } catch (error) {
                console.error('Failed to load accounts from PocketBase:', error);
            }
        }

        async function loadContactsFromPB() {
            try {
                const records = await pb.collection('contacts').getFullList({
                    $autoCancel: false,
                    requestKey: null
                });
                if (records.length > 0) {
                    appState.contacts = records.map(record => ({
                        id: record.id,
                        name: record.name,
                        phone: record.phone,
                        desc: record.description
                    }));
                    renderContacts();
                }
            } catch (error) {
                console.error('Failed to load contacts from PocketBase:', error);
            }
        }

        async function loadSettingsFromPB() {
            try {
                const records = await pb.collection('settings').getFullList({
                    $autoCancel: false,
                    requestKey: null
                });
                const usdtSetting = records.find(r => r.key === 'usdt_address');
                if (usdtSetting) {
                    appState.usdtAddress = usdtSetting.value;
                    const usdtEl = document.getElementById('current-usdt-address');
                    if (usdtEl) usdtEl.innerText = usdtSetting.value;
                }
            } catch (error) {
                console.error('Failed to load settings from PocketBase:', error);
            }
        }

        // ============================================
        // RENDERING FUNCTIONS
        // ============================================
        function renderAccounts() {
            const grid = document.getElementById('accounts-grid');
            if (!grid) return;
            
            let filtered = appState.accounts;
            if (appState.currentFilter !== 'all') {
                filtered = filtered.filter(a => a.tier === appState.currentFilter);
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; padding:2rem; text-align:center;">No accounts in this tier</div>';
                return;
            }
            
            const t = translations[appState.currentLanguage] || translations.en;
            
            grid.innerHTML = filtered.map(acc => {
                const mediaHtml = acc.mediaType === 'video' 
                    ? `<video src="${acc.media}" class="card-media" controls controlsList="nodownload" autoplay muted loop playsinline crossorigin="anonymous" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'card-media\\' style=\\'display:flex;align-items:center;justify-content:center;background:var(--surface-lighter);\\'><span style=\\'font-size:3rem;\\'>📹</span></div>';"></video>`
                    : `<img src="${acc.media}" class="card-media" alt="${acc.title}" crossorigin="anonymous" loading="lazy" onerror="this.onerror=null; this.src='https://images.pexels.com/photos/3165335/pexels-photo-3165335.jpeg?auto=compress&w=400';">`;
                
                return `
                    <div class="account-card" data-id="${acc.id}">
                        <div style="position:relative; width:100%; aspect-ratio:16/9; overflow:hidden; background:var(--surface-lighter);">
                            ${mediaHtml}
                        </div>
                        <div class="card-content">
                            <div class="card-title">
                                ${acc.title}
                                <span class="tier-badge ${acc.tier}">${acc.tier}</span>
                            </div>
                            <div class="card-desc">${acc.desc || 'Premium PUBG account'}</div>
                            <div class="price-row">
                                <span class="usd-price">$${acc.price_usd.toFixed(2)}</span>
                                <span class="afn-price">${acc.price_afn.toLocaleString()} AFN</span>
                            </div>
                            <div class="action-buttons">
                                <button class="action-btn" onclick="bookAccount('${acc.id}')"><i class="fa fa-bookmark"></i> ${t.bookTitle}</button>
                                <button class="action-btn buy" onclick="buyAccount('${acc.id}')"><i class="fa fa-bolt"></i> ${t.buyTitle}</button>
                                <button class="action-btn" onclick="infoAccount('${acc.id}')"><i class="fa fa-info"></i> ${t.infoTitle}</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderContacts() {
            const container = document.getElementById('contacts-container');
            if (!container) return;
            
            if (appState.contacts.length === 0) {
                container.innerHTML = '<div class="account-card" style="padding:2rem; text-align:center;">No contacts available</div>';
                return;
            }
            
            const t = translations[appState.currentLanguage] || translations.en;
            
            container.innerHTML = appState.contacts.map(contact => {

        function renderAdsSlider() {
            const container = document.getElementById('ads-slider');
            if (!container) return;
            
            if (appState.ads.length === 0) {
                container.innerHTML = '<div class="swipe-ads" style="padding:2rem; text-align:center;">No ads</div>';
                return;
            }
            
            let slides = '';
            appState.ads.forEach((ad, idx) => {
                if (ad.type === 'video') {
                    slides += `<div class="slide"><video src="${ad.data}" controls controlsList="nodownload" muted loop playsinline></video><div class="slide-caption">${ad.caption || ''}</div></div>`;
                } else {
                    slides += `<div class="slide"><img src="${ad.data}" alt="ad"><div class="slide-caption">${ad.caption || ''}</div></div>`;
                }
            });
            
            let dots = '';
            appState.ads.forEach((_, idx) => {
                dots += `<span class="dot ${idx === 0 ? 'active' : ''}" onclick="jumpToSlide(${idx})"></span>`;
            });
            
            container.innerHTML = `
                <div class="slider-container">
                    <div class="slider-track" id="slider-track">${slides}</div>
                    <div class="slider-dots">${dots}</div>
                </div>
            `;
            
            const track = document.getElementById('slider-track');
            if (track) {
                track.addEventListener('scroll', function() {
                    const idx = Math.round(track.scrollLeft / track.clientWidth);
                    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
                });
            }
            startAutoSlide();
        }

        function startAutoSlide() {
            if (appState.autoSlideInterval) clearInterval(appState.autoSlideInterval);
            
            appState.autoSlideInterval = setInterval(() => {
                const track = document.getElementById('slider-track');
                if (!track || appState.ads.length === 0) return;
                
                const slideWidth = track.clientWidth;
                const currentScroll = track.scrollLeft;
                const currentIndex = Math.round(currentScroll / slideWidth);
                const nextIndex = (currentIndex + 1) % appState.ads.length;
                
                track.scrollTo({
                    left: nextIndex * slideWidth,
                    behavior: 'smooth'
                });
                
                document.querySelectorAll('.dot').forEach((dot, i) => {
                    dot.classList.toggle('active', i === nextIndex);
                });
            }, 2000);
        }

        window.jumpToSlide = function(idx) {
            const track = document.getElementById('slider-track');
            if (track) {
                track.scrollTo({ left: idx * track.clientWidth, behavior: 'smooth' });
                startAutoSlide();
            }
        };

            const progressText = document.getElementById('progress-text');
            const uploadBtn = document.getElementById('upload-btn');
            
            progressContainer.classList.add('active');
            uploadBtn.disabled = true;
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    
                    setTimeout(() => {
                        progressBar.style.width = '100%';
                        progressText.innerHTML = 'Upload complete!';
                        
                        const newAccount = {
                            id: 'a' + Date.now(),

                            price_usd: priceUsd,

                            renderAccounts();
                            if (appState.isAdminLoggedIn) {
                                document.getElementById('admin-account-count').innerText = appState.accounts.length;
                            }
                            alert('Account uploaded successfully!');
                            
                            progressContainer.classList.remove('active');
                            progressBar.style.width = '0%';
                            progressText.innerHTML = '';
                            uploadBtn.disabled = false;
                        }, 500);
                    }, 300);
                }

                const usdtSetting = settings.find(s => s.key === 'usdt_address');
                if (usdtSetting) {
                    appState.usdtAddress = usdtSetting.value;
                    document.getElementById('current-usdt-address').innerText = usdtSetting.value;
                }
                
                renderBookRequests();
            } catch (error) {
                document.getElementById('admin-error').innerText = 'Invalid credentials';
            }
        };

        window.logout = function() {
            pb.authStore.clear();
            appState.isAdminLoggedIn = false;
            document.getElementById('admin-login-section').classList.remove('hidden');
            document.getElementById('admin-dashboard').classList.add('hidden');
            switchScreen('main');
        };

        window.copyUsdt = function() {
            navigator.clipboard.writeText(appState.usdtAddress);
            alert('USDT address copied');
        };

        window.openModal = function(id) {
            document.getElementById(id).classList.remove('hidden');
        };
        
        window.closeModal = function(id) {
            document.getElementById(id).classList.add('hidden');
            if (id === 'book-modal' && appState.bookPhoneInput) {
                try {
                    appState.bookPhoneInput.destroy();
                } catch (e) {}
                appState.bookPhoneInput = null;
            }
        };
        
        window.openLanguageModal = function() {
            openModal('language-modal');
        };
        
        window.setLanguage = function(lang) {
            applyTranslation(lang);
            closeModal('language-modal');
        };

        window.cancelBookRequest = function(id) {
            if (confirm('Cancel this book request?')) {
                appState.bookRequests = appState.bookRequests.filter(r => r.id != id);
                localStorage.setItem('gk_bookings', JSON.stringify(appState.bookRequests));
                document.getElementById('admin-bookings-count').innerText = appState.bookRequests.length;
                renderBookRequests();
            }
        };

        function initPhoneInput() {
            const input = document.querySelector('#contact-phone');
            if (input && !appState.phoneInput) {
                appState.phoneInput = intlTelInput(input, {
                    initialCountry: 'af',
                    separateDialCode: true,
                    utilsScript: 'https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js',
                    dropdownContainer: document.body
                });
            }
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        const savedLang = localStorage.getItem('gk_language') || 'en';
        applyTranslation(savedLang);
        renderAdsSlider();
        renderContacts();
        renderAccounts();
        
        loadAccountsFromPB();
        loadContactsFromPB();
        loadSettingsFromPB();
        
        trackVisitor();
        setInterval(trackVisitor, 30000);
        setInterval(() => {
            if (document.visibilityState === 'visible') {
                trackVisitor();
            }
        }, 60000);
    </script>
</body>
</html>
